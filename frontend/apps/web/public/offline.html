<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0050cb" />
    <title>Parkio — Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #f8f9ff;
        color: #0b1c30;
        font-family: Inter, system-ui, sans-serif;
      }
      main {
        max-width: 480px;
        border: 1px solid #c2c6d8;
        border-radius: 24px;
        background: white;
        padding: 32px;
        box-shadow: 0 16px 48px rgb(11 28 48 / 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 28px;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #424656;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Parkio is offline</h1>
      <p>
        The app shell is available, but live map data and account actions need a network
        connection. Reconnect and reload Parkio to continue.
      </p>
    </main>
  </body>
</html>
