# Test configuration: in-memory H2 (PostgreSQL compatibility), schema generated
# from the JPA entities, Flyway disabled. Keeps the build self-contained and fast
# (no Docker / Testcontainers required) per ai-context/08.
spring:
  datasource:
    url: jdbc:h2:mem:authdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false
  kafka:
    listener:
      # No broker in tests: do not start listener containers (the @KafkaListener consumer).
      auto-startup: false
  data:
    redis:
      host: localhost
      port: 6379

# Mirror production actuator exposure (this file shadows the main application.yml).
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  # Tracing exports only at runtime; off in tests so no OTLP exporter thread starts.
  tracing:
    enabled: false

parkio:
  lifecycle:
    retention:
      outbox-enabled: false
      inbox-enabled: false
  gateway:
    internal-secret: test-only-parkio-gateway-internal-secret-0123456789
  security:
    refresh-cookie:
      allowed-origins: http://localhost:5173
    email-verification:
      log-token: true
    jwt:
      key-id: auth-test-key
      generate-ephemeral-key: true
      issuer: parkio-auth-test
      audience: parkio-api-test
      access-token-ttl: PT15M
      refresh-token-ttl: P30D
  kafka:
    # No broker in tests: skip topic provisioning and disable the outbox relay so the
    # context starts without Kafka (the relay poller / native query never runs).
    provision-topics: false
    relay:
      enabled: false
