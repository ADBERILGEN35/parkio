spring:
  application:
    name: auth-service
  kafka:
    # Broker is externalized; local/dev default targets the docker-compose host listener.
    bootstrap-servers: ${PARKIO_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        # Envelope is self-describing; the consumer reads it as JSON, so no type headers.
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.parkio.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual
    admin:
      # Missing broker at startup must not fail the context.
      fail-fast: false
  jackson:
    # Event compatibility (event-contracts.md): tolerate unknown fields, ISO-8601 instants.
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parkio_auth}
    username: ${SPRING_DATASOURCE_USERNAME:parkio_auth}
    password: ${SPRING_DATASOURCE_PASSWORD:auth_local_dev_pw}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8081}

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-unknown}]"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: auth-service
    description: Parkio auth-service

parkio:
  lifecycle:
    retention:
      outbox-enabled: ${PARKIO_OUTBOX_RETENTION_ENABLED:true}
      inbox-enabled: ${PARKIO_INBOX_RETENTION_ENABLED:true}
      outbox-retention: ${PARKIO_OUTBOX_RETENTION:P7D}
      inbox-retention: ${PARKIO_INBOX_RETENTION:P30D}
      fixed-delay-ms: ${PARKIO_RETENTION_FIXED_DELAY_MS:3600000}
      batch-size: ${PARKIO_RETENTION_BATCH_SIZE:1000}
  gateway:
    # Shared secret required on every inbound request (X-Gateway-Auth) so only
    # gateway-originated traffic is accepted. No default → fail closed if unset.
    internal-secret: ${PARKIO_GATEWAY_INTERNAL_SECRET}
  security:
    jwt:
      # PKCS#8 RSA private key. No default: production fails closed unless supplied.
      # The dev profile explicitly enables ephemeral key generation.
      private-key-pem: ${PARKIO_JWT_PRIVATE_KEY_PEM:}
      key-id: ${PARKIO_JWT_KEY_ID:parkio-auth-rs256-1}
      generate-ephemeral-key: false
      issuer: ${PARKIO_JWT_ISSUER:parkio-auth}
      # ISO-8601 durations.
      access-token-ttl: ${PARKIO_JWT_ACCESS_TTL:PT15M}
      refresh-token-ttl: ${PARKIO_JWT_REFRESH_TTL:P30D}
  kafka:
    # Topic provisioning via NewTopic beans (KafkaTopicsConfig). Replication factor is
    # configurable for production; 1 is the local/dev default (single-broker compose).
    provision-topics: true
    replication-factor: ${PARKIO_KAFKA_REPLICATION_FACTOR:1}
    relay:
      # Outbox relay: publishes UserRegistered to parkio.auth.user. Poll interval and
      # batch size are configurable; send-timeout bounds the per-row broker ack wait.
      enabled: true
      poll-interval-ms: 1000
      batch-size: 100
      send-timeout-ms: 10000
