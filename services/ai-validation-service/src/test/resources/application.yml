# Test configuration: in-memory H2 (PostgreSQL compatibility), schema generated
# from the JPA entities, Flyway disabled. Keeps the build self-contained and fast
# (no Docker / Testcontainers required) per ai-context/08.
spring:
  datasource:
    url: jdbc:h2:mem:aivalidationdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false
  kafka:
    listener:
      # No broker in tests: do not start listener containers (the @KafkaListener consumer).
      auto-startup: false

parkio:
  lifecycle:
    retention:
      outbox-enabled: false
      inbox-enabled: false
  gateway:
    internal-secret: test-only-parkio-gateway-internal-secret-0123456789
  kafka:
    # No broker in tests: skip topic provisioning and disable the outbox relay so the
    # context starts without Kafka (the relay poller / native query never runs).
    provision-topics: false
    relay:
      enabled: false
