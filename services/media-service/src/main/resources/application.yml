spring:
  application:
    name: media-service
  kafka:
    # Broker is externalized; local/dev default targets the docker-compose host listener.
    bootstrap-servers: ${PARKIO_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        # Envelope is self-describing; consumers read it as JSON, so no type headers.
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.parkio.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual
    admin:
      # Missing broker at startup must not fail the context.
      fail-fast: false
  jackson:
    # Event compatibility (event-contracts.md): tolerate unknown fields, ISO-8601 instants.
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parkio_media}
    username: ${SPRING_DATASOURCE_USERNAME:parkio_media}
    password: ${SPRING_DATASOURCE_PASSWORD:media_local_dev_pw}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # Hard limits enforced by the container. Kept slightly above the
      # application-level cap (parkio.media.max-file-size) so oversized uploads
      # surface as a clean 413 from our handler rather than a container error.
      max-file-size: 12MB
      max-request-size: 15MB

server:
  port: ${SERVER_PORT:8084}

logging:
  pattern:
    level: "%5p [${spring.application.name:-},traceId=%X{traceId:-},spanId=%X{spanId:-},correlationId=%X{correlationId:-}]"

management:
  endpoints:
    web:
      exposure:
        # Probes + Prometheus scrape only â€” never sensitive endpoints (env, beans, ...).
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the service name (kept in sync with the scrape label).
      application: ${spring.application.name}
  tracing:
    # 100% sampling for hosted-beta; tune down to 0.05-0.20 for production via env.
    enabled: ${PARKIO_TRACING_ENABLED:true}
    sampling:
      probability: ${PARKIO_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      # OTLP/HTTP span export to Tempo. The localhost default is for IDE-only dev; the
      # docker-compose apps overlay sets this to http://tempo:4318/v1/traces.
      endpoint: ${PARKIO_TRACING_OTLP_ENDPOINT:http://localhost:4318/v1/traces}


springdoc:
  api-docs:
    enabled: ${parkio.openapi.enabled:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${parkio.openapi.enabled:true}
    path: /swagger-ui.html
  show-actuator: false

info:
  app:
    name: media-service
    description: Parkio media-service

parkio:
  openapi:
    enabled: ${PARKIO_OPENAPI_ENABLED:true}
  idempotency:
    ttl: ${PARKIO_IDEMPOTENCY_TTL:24h}
  lifecycle:
    retention:
      outbox-enabled: ${PARKIO_OUTBOX_RETENTION_ENABLED:true}
      inbox-enabled: ${PARKIO_INBOX_RETENTION_ENABLED:true}
      outbox-retention: ${PARKIO_OUTBOX_RETENTION:P7D}
      inbox-retention: ${PARKIO_INBOX_RETENTION:P30D}
      fixed-delay-ms: ${PARKIO_RETENTION_FIXED_DELAY_MS:3600000}
      batch-size: ${PARKIO_RETENTION_BATCH_SIZE:1000}
  gateway:
    # Shared secret required on every inbound request (X-Gateway-Auth) so only
    # gateway-originated traffic is accepted. No default â†’ fail closed if unset.
    internal-secret: ${PARKIO_GATEWAY_INTERNAL_SECRET}
    # Optional comma-separated previous secrets also accepted during a rotation. The
    # gateway always sends `internal-secret`; downstream accepts that plus these so the
    # old and new secret overlap with no downtime. Empty when no rotation is in progress.
    internal-accepted-secrets: ${PARKIO_GATEWAY_INTERNAL_ACCEPTED_SECRETS:}
  media:
    # Application-level upload constraints.
    max-file-size: 10MB
    max-image-width: ${PARKIO_MEDIA_MAX_IMAGE_WIDTH:8000}
    max-image-height: ${PARKIO_MEDIA_MAX_IMAGE_HEIGHT:8000}
    max-image-pixels: ${PARKIO_MEDIA_MAX_IMAGE_PIXELS:40000000}
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    # Lifetime of presigned GET URLs returned by /api/v1/media/{id}/access-url.
    # Short-lived by design; URLs are generated per request and never persisted.
    access-url-ttl: ${PARKIO_MEDIA_ACCESS_URL_TTL:5m}
    # Anti-malware scan (ClamAV/clamd over TCP) run on the bytes BEFORE they are
    # stored or made servable. Fail-closed: a scan that cannot be completed rejects
    # the upload (503). Disable ONLY for local dev without a clamd container / tests
    # (PARKIO_MEDIA_SCANNER_ENABLED=false) — never where real users are served.
    # NB: this is malware scanning, NOT illegal/abusive-content moderation.
    scanner:
      enabled: ${PARKIO_MEDIA_SCANNER_ENABLED:true}
      host: ${PARKIO_MEDIA_SCANNER_HOST:localhost}
      port: ${PARKIO_MEDIA_SCANNER_PORT:3310}
      connect-timeout: ${PARKIO_MEDIA_SCANNER_CONNECT_TIMEOUT:2s}
      # Bounds how long an upload request waits on the scan before failing closed.
      read-timeout: ${PARKIO_MEDIA_SCANNER_READ_TIMEOUT:10s}
    storage:
      bucket: ${PARKIO_MEDIA_BUCKET:parkio-media}
      # S3-compatible endpoints (MinIO in local/dev). Credentials are injected;
      # the defaults below are LOCAL DEV ONLY and must be overridden everywhere
      # else (ai-context/07).
      # endpoint: SDK PUT/stat/DELETE (container-reachable in compose: minio:9000).
      endpoint: ${PARKIO_MEDIA_STORAGE_ENDPOINT:http://localhost:9000}
      # public-endpoint: host embedded in presigned GET URLs (browser-reachable).
      public-endpoint: ${PARKIO_MEDIA_STORAGE_PUBLIC_ENDPOINT:http://localhost:9000}
      access-key: ${PARKIO_MEDIA_STORAGE_ACCESS_KEY:minioadmin}
      secret-key: ${PARKIO_MEDIA_STORAGE_SECRET_KEY:minioadmin}
      region: ${PARKIO_MEDIA_STORAGE_REGION:us-east-1}
  kafka:
    # Topic provisioning via NewTopic beans (KafkaTopicsConfig). Replication factor is
    # configurable for production; 1 is the local/dev default (single-broker compose).
    provision-topics: true
    replication-factor: ${PARKIO_KAFKA_REPLICATION_FACTOR:1}
    relay:
      # Outbox relay: publishes media events to parkio.media.media. Poll interval and
      # batch size are configurable; send-timeout bounds the per-row broker ack wait.
      enabled: true
      poll-interval-ms: 1000
      batch-size: 100
      send-timeout-ms: 10000
