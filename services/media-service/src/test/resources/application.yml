# Test configuration: in-memory H2 (PostgreSQL compatibility), schema generated
# from the JPA entities, Flyway disabled. Keeps the build self-contained and fast
# (no Docker / Testcontainers / MinIO required) per ai-context/08.
spring:
  datasource:
    url: jdbc:h2:mem:mediadb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false

parkio:
  idempotency:
    ttl: 24h
  lifecycle:
    retention:
      outbox-enabled: false
      inbox-enabled: false
  gateway:
    internal-secret: test-only-parkio-gateway-internal-secret-0123456789
  media:
    max-file-size: 10MB
    allowed-content-types:
      - image/jpeg
      - image/png
      - image/webp
    # No clamd in the H2-based context tests: wire the pass-through scanner so the
    # context starts. Scan behaviour is covered by MediaApplicationServiceTest with a
    # fake scanner.
    scanner:
      enabled: false
    storage:
      bucket: parkio-media-test
      endpoint: http://localhost:9000
      access-key: test
      secret-key: test
      region: us-east-1
  kafka:
    # No broker in tests: skip topic provisioning and disable the outbox relay so the
    # context starts without Kafka (the relay poller / native query never runs).
    provision-topics: false
    relay:
      enabled: false

# Tracing exports only at runtime; disabled in tests so no OTLP exporter starts.
management:
  tracing:
    enabled: false
