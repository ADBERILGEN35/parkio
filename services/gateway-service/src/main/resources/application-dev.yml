# Local-development profile. Activate with SPRING_PROFILES_ACTIVE=dev.
# The gateway retrieves auth-service's ephemeral dev public key from JWKS.
spring:
  data:
    # Edge rate limiting needs Redis. `docker compose up redis` (docker/docker-compose.yml)
    # exposes it on localhost:6379. Without Redis the rate-limit filter cannot evaluate;
    # run Redis for a faithful local edge.
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

parkio:
  gateway:
    # NON-PRODUCTION shared secret. Must match every downstream service's dev secret.
    internal-secret: dev-only-parkio-gateway-internal-secret-change-me-0123456789
    cors:
      allowed-origins: http://localhost:3000,http://localhost:5173
      # The SPA sends credentialed requests (withCredentials) so the HttpOnly refresh
      # cookie is set/sent on /auth/** calls. Browsers require
      # Access-Control-Allow-Credentials: true on those responses, alongside a non-
      # wildcard Access-Control-Allow-Origin. Without this the browser blocks the login
      # response as a CORS error even though the request reaches the gateway. The
      # docker-compose overlay already sets PARKIO_CORS_ALLOW_CREDENTIALS=true; this
      # mirrors it for the `dev` (gradlew bootRun) profile. Safe because origins above
      # are an explicit allow-list (never "*"); CorsConfig still rejects wildcard+creds.
      allow-credentials: true
