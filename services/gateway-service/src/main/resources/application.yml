spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      # Downstream URIs are externalized; defaults target local dev ports. In a
      # container/orchestrated environment these resolve to service DNS names.
      routes:
        # --- Active services -------------------------------------------------
        - id: auth-service
          uri: ${PARKIO_AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
        - id: user-service
          uri: ${PARKIO_USER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**
        # --- Placeholders for services not yet implemented -------------------
        # Routes are wired now so the edge contract is stable; the targets will
        # answer once each service is built. All are protected (require a JWT).
        - id: parking-service
          uri: ${PARKIO_PARKING_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/parking/**
        - id: media-service
          uri: ${PARKIO_MEDIA_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/media/**
        - id: gamification-service
          uri: ${PARKIO_GAMIFICATION_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/gamification/**
        - id: notification-service
          uri: ${PARKIO_NOTIFICATION_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**
        - id: moderation-service
          uri: ${PARKIO_MODERATION_SERVICE_URI:http://localhost:8087}
          predicates:
            - Path=/api/v1/moderation/**

      # --- Rate limiting (placeholder) ---------------------------------------
      # Production rate limiting should run here per user/IP (ai-context/07).
      # Spring Cloud Gateway's RequestRateLimiter uses a Redis token bucket; Redis
      # is not yet a project dependency, so this is left as a documented backlog
      # item rather than a half-wired filter. To enable:
      #   1. add spring-boot-starter-data-redis-reactive to build.gradle.kts
      #   2. provide a KeyResolver bean (e.g. by X-User-Id, else client IP)
      #   3. add a default filter:
      #        default-filters:
      #          - name: RequestRateLimiter
      #            args:
      #              redis-rate-limiter.replenishRate: 10
      #              redis-rate-limiter.burstCapacity: 20

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: gateway-service
    description: Parkio gateway-service

parkio:
  security:
    jwt:
      # No default: the gateway fails to start unless PARKIO_JWT_SECRET is provided
      # (fail closed, ai-context/07). For local development run with the `dev`
      # profile (see application-dev.yml) or export PARKIO_JWT_SECRET. The secret
      # and issuer MUST match auth-service (shared HS256 signing contract).
      secret: ${PARKIO_JWT_SECRET}
      issuer: ${PARKIO_JWT_ISSUER:parkio-auth}
  gateway:
    cors:
      # Lock down to the real web/app origins in each environment. Empty by
      # default → no cross-origin browser access is permitted (safe default).
      allowed-origins: ${PARKIO_CORS_ALLOWED_ORIGINS:}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: false
      max-age: PT1H
