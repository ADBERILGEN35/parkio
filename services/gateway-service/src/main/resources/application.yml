spring:
  application:
    name: gateway-service
  data:
    # Reactive Redis backs the edge RequestRateLimiter token bucket. In docker-compose
    # this resolves to the `redis` service; locally it defaults to localhost:6379.
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  cloud:
    gateway:
      # Downstream URIs are externalized; defaults target local dev ports. In a
      # container/orchestrated environment these resolve to service DNS names.
      #
      # Every route carries a RequestRateLimiter filter (Redis token bucket, keyed by
      # authenticated userId else client IP — see RateLimitConfig). Per-tier limits
      # are env-overridable; defaults are conservative (ai-context/07):
      #   auth login/register   strict   — credential-stuffing / enumeration defence
      #   media upload          stricter — expensive writes
      #   parking create/verify/claim  moderate
      #   general authenticated APIs   broader
      routes:
        # --- Auth (mixed public/protected): strict limit -------------------------
        - id: auth-service
          uri: ${PARKIO_AUTH_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_AUTH_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_AUTH_BURST:10}
        # --- User profile: broad authenticated limit -----------------------------
        - id: user-service
          uri: ${PARKIO_USER_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}
        # --- Parking (create/verify/claim): moderate limit -----------------------
        - id: parking-service
          uri: ${PARKIO_PARKING_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/v1/parking/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_PARKING_REPLENISH:10}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_PARKING_BURST:20}
        # --- Media upload: stricter limit ----------------------------------------
        - id: media-service
          uri: ${PARKIO_MEDIA_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/v1/media/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_MEDIA_REPLENISH:2}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_MEDIA_BURST:5}
        # --- General authenticated APIs: broad limit -----------------------------
        - id: gamification-service
          uri: ${PARKIO_GAMIFICATION_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/v1/gamification/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}
        - id: notification-service
          uri: ${PARKIO_NOTIFICATION_SERVICE_URI:http://localhost:8086}
          predicates:
            - Path=/api/v1/notifications/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}
        - id: moderation-service
          uri: ${PARKIO_MODERATION_SERVICE_URI:http://localhost:8087}
          predicates:
            - Path=/api/v1/moderation/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}
        - id: ai-validation-service
          uri: ${PARKIO_AI_VALIDATION_SERVICE_URI:http://localhost:8088}
          predicates:
            - Path=/api/v1/ai-validations/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}
        - id: analytics-service
          uri: ${PARKIO_ANALYTICS_SERVICE_URI:http://localhost:8089}
          predicates:
            - Path=/api/v1/analytics/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userOrIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${PARKIO_RL_DEFAULT_REPLENISH:30}
                redis-rate-limiter.burstCapacity: ${PARKIO_RL_DEFAULT_BURST:60}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: gateway-service
    description: Parkio gateway-service

parkio:
  security:
    jwt:
      # No default: the gateway fails to start unless PARKIO_JWT_SECRET is provided
      # (fail closed, ai-context/07). For local development run with the `dev`
      # profile (see application-dev.yml) or export PARKIO_JWT_SECRET. The secret
      # and issuer MUST match auth-service (shared HS256 signing contract).
      secret: ${PARKIO_JWT_SECRET}
      issuer: ${PARKIO_JWT_ISSUER:parkio-auth}
  gateway:
    cors:
      # Lock down to the real web/app origins in each environment. Empty by
      # default → no cross-origin browser access is permitted (safe default).
      allowed-origins: ${PARKIO_CORS_ALLOWED_ORIGINS:}
      allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: false
      max-age: PT1H
    user-status:
      # Live account-status enforcement: after JWT validation the gateway checks the
      # caller's CURRENT status from user-service (a token alone proves identity, not
      # that the account is still active). Base URL matches the user-service route
      # target; results are cached briefly. If user-service is unavailable the gateway
      # fails closed (503 USER_STATUS_UNAVAILABLE) rather than letting requests through.
      base-url: ${PARKIO_USER_SERVICE_URI:http://localhost:8082}
      cache-ttl: ${PARKIO_USER_STATUS_CACHE_TTL:PT30S}
      request-timeout: ${PARKIO_USER_STATUS_TIMEOUT:PT2S}
