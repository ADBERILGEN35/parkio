# Test configuration: supplies a JWT secret/issuer so the context starts without
# environment variables. The secret matches the one the tests use to mint tokens.
parkio:
  security:
    jwt:
      secret: test-only-parkio-gateway-jwt-secret-0123456789-abcdefghijklmnop
      issuer: parkio-auth-test
  gateway:
    cors:
      allowed-origins: http://localhost:3000
