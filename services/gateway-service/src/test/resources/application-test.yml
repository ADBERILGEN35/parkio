# Test profile (activate with @ActiveProfiles("test")). Loaded ON TOP of the real
# application.yml, so @SpringBootTest exercises the actual route table and rate-limit
# wiring while this profile supplies a non-routable JWKS URL. Unit tests provide
# their own key resolver; the context does not fetch JWKS until a token is validated.
parkio:
  security:
    jwt:
      issuer: parkio-auth-test
      jwks-uri: http://127.0.0.1:1/test-jwks
      jwks-cache-ttl: PT15M
  gateway:
    internal-secret: test-only-parkio-gateway-internal-secret-0123456789
    cors:
      allowed-origins: http://localhost:3000
