spring:
  application:
    name: gamification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parkio_gamification}
    username: ${SPRING_DATASOURCE_USERNAME:parkio_gamification}
    password: ${SPRING_DATASOURCE_PASSWORD:gamification_local_dev_pw}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8085}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

info:
  app:
    name: gamification-service
    description: Parkio gamification-service

parkio:
  gamification:
    leaderboard:
      default-limit: 20
      max-limit: 100
