spring:
  application:
    name: notification-service
  kafka:
    # Broker is externalized; local/dev default targets the docker-compose host listener.
    bootstrap-servers: ${PARKIO_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.parkio.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual
    admin:
      # Missing broker at startup must not fail the context.
      fail-fast: false
  jackson:
    # Event compatibility (event-contracts.md): tolerate unknown fields, ISO-8601 instants.
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parkio_notification}
    username: ${SPRING_DATASOURCE_USERNAME:parkio_notification}
    password: ${SPRING_DATASOURCE_PASSWORD:notification_local_dev_pw}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8086}

logging:
  pattern:
    level: "%5p [traceId:%X{traceId:-unknown}]"

management:
  endpoints:
    web:
      exposure:
        # Probes + Prometheus scrape only — never sensitive endpoints (env, beans, ...).
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the service name (kept in sync with the scrape label).
      application: ${spring.application.name}

info:
  app:
    name: notification-service
    description: Parkio notification-service

parkio:
  lifecycle:
    retention:
      outbox-enabled: ${PARKIO_OUTBOX_RETENTION_ENABLED:true}
      inbox-enabled: ${PARKIO_INBOX_RETENTION_ENABLED:true}
      outbox-retention: ${PARKIO_OUTBOX_RETENTION:P7D}
      inbox-retention: ${PARKIO_INBOX_RETENTION:P30D}
      fixed-delay-ms: ${PARKIO_RETENTION_FIXED_DELAY_MS:3600000}
      batch-size: ${PARKIO_RETENTION_BATCH_SIZE:1000}
  gateway:
    # Shared secret required on every inbound request (X-Gateway-Auth) so only
    # gateway-originated traffic is accepted. No default → fail closed if unset.
    internal-secret: ${PARKIO_GATEWAY_INTERNAL_SECRET}
  kafka:
    # Topic provisioning via NewTopic beans (KafkaTopicsConfig). Replication factor is
    # configurable for production; 1 is the local/dev default (single-broker compose).
    provision-topics: true
    replication-factor: ${PARKIO_KAFKA_REPLICATION_FACTOR:1}
  notification:
    delivery:
      push:
        # Scheduled worker that drains PENDING push attempts. Enabled by default; the
        # default 'noop' provider needs no Firebase/APNS credentials (local/dev/test).
        enabled: ${PARKIO_PUSH_DELIVERY_ENABLED:true}
        provider: ${PARKIO_PUSH_DELIVERY_PROVIDER:noop}        # noop | fcm-disabled
        fixed-delay-ms: ${PARKIO_PUSH_DELIVERY_FIXED_DELAY_MS:30000}
        batch-size: ${PARKIO_PUSH_DELIVERY_BATCH_SIZE:100}
        max-attempts: ${PARKIO_PUSH_DELIVERY_MAX_ATTEMPTS:5}
        # Base retry backoff; attempt n is retried no earlier than
        # base-backoff-ms * 2^(n-1) after the failure (exponential).
        base-backoff-ms: ${PARKIO_PUSH_DELIVERY_BASE_BACKOFF_MS:30000}
        fcm:
          # Real FCM is backlog: disabled by default; no credentials committed. These
          # are placeholders for when the real adapter is implemented.
          enabled: ${PARKIO_FCM_ENABLED:false}
          project-id: ${PARKIO_FCM_PROJECT_ID:}
          credentials-location: ${PARKIO_FCM_CREDENTIALS_LOCATION:}
