spring:
  application:
    name: parking-service
  data:
    # Redis backs the best-effort forward-geocoding cache. In docker-compose this
    # resolves to the `redis` service; locally it defaults to localhost:6379. The
    # cache adapter degrades to a miss if Redis is unreachable (no hard dependency).
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  kafka:
    # Broker is externalized; local/dev default targets the docker-compose host listener.
    bootstrap-servers: ${PARKIO_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    template:
      observation-enabled: true
    listener:
      observation-enabled: true
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        # Envelope is self-describing; consumers read it as JSON, so no type headers.
        spring.json.add.type.headers: false
    consumer:
      group-id: ${spring.application.name}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.parkio.*"
        spring.json.use.type.headers: false
    listener:
      ack-mode: manual
    admin:
      # Missing broker at startup must not fail the context.
      fail-fast: false
  jackson:
    # Event compatibility (event-contracts.md): tolerate unknown fields, ISO-8601 instants.
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parkio_parking}
    username: ${SPRING_DATASOURCE_USERNAME:parkio_parking}
    password: ${SPRING_DATASOURCE_PASSWORD:parking_local_dev_pw}
  jpa:
    open-in-view: false
    hibernate:
      # Schema is owned by Flyway; Hibernate only validates the mapping.
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8083}
  # Graceful shutdown: on SIGTERM stop accepting new requests and let in-flight
  # ones drain (spring.lifecycle.timeout-per-shutdown-phase, 30s) before the JVM exits.
  shutdown: graceful

logging:
  pattern:
    level: "%5p [${spring.application.name:-},traceId=%X{traceId:-},spanId=%X{spanId:-},correlationId=%X{correlationId:-},eventId=%X{eventId:-}]"

management:
  endpoints:
    web:
      exposure:
        # Probes + Prometheus scrape only â€” never sensitive endpoints (env, beans, ...).
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      # Tag every metric with the service name (kept in sync with the scrape label).
      application: ${spring.application.name}
  tracing:
    # 100% sampling for hosted-beta; tune down to 0.05-0.20 for production via env.
    enabled: ${PARKIO_TRACING_ENABLED:true}
    sampling:
      probability: ${PARKIO_TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      # OTLP/HTTP span export to Tempo. The localhost default is for IDE-only dev; the
      # docker-compose apps overlay sets this to http://tempo:4318/v1/traces.
      endpoint: ${PARKIO_TRACING_OTLP_ENDPOINT:http://localhost:4318/v1/traces}


springdoc:
  api-docs:
    enabled: ${parkio.openapi.enabled:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${parkio.openapi.enabled:true}
    path: /swagger-ui.html
  show-actuator: false

info:
  app:
    name: parking-service
    description: Parkio parking-service

parkio:
  openapi:
    enabled: ${PARKIO_OPENAPI_ENABLED:true}
  idempotency:
    ttl: ${PARKIO_IDEMPOTENCY_TTL:24h}
  lifecycle:
    parking-expiry:
      enabled: ${PARKIO_PARKING_EXPIRY_ENABLED:true}
      fixed-delay-ms: ${PARKIO_PARKING_EXPIRY_FIXED_DELAY_MS:60000}
      batch-size: ${PARKIO_PARKING_EXPIRY_BATCH_SIZE:100}
    retention:
      outbox-enabled: ${PARKIO_OUTBOX_RETENTION_ENABLED:true}
      inbox-enabled: ${PARKIO_INBOX_RETENTION_ENABLED:true}
      outbox-retention: ${PARKIO_OUTBOX_RETENTION:P7D}
      inbox-retention: ${PARKIO_INBOX_RETENTION:P30D}
      fixed-delay-ms: ${PARKIO_RETENTION_FIXED_DELAY_MS:3600000}
      batch-size: ${PARKIO_RETENTION_BATCH_SIZE:1000}
  gateway:
    # Shared secret required on every inbound request (X-Gateway-Auth) so only
    # gateway-originated traffic is accepted. No default â†’ fail closed if unset.
    internal-secret: ${PARKIO_GATEWAY_INTERNAL_SECRET}
    # Optional comma-separated previous secrets also accepted during a rotation. The
    # gateway always sends `internal-secret`; downstream accepts that plus these so the
    # old and new secret overlap with no downtime. Empty when no rotation is in progress.
    internal-accepted-secrets: ${PARKIO_GATEWAY_INTERNAL_ACCEPTED_SECRETS:}
  media:
    client:
      # Internal base URL of media-service, used to request short-lived signed
      # photo URLs on behalf of authorized spot viewers. Calls carry the shared
      # X-Gateway-Auth secret; timeouts are short so a media outage degrades to a
      # fast 503 instead of stalling request threads.
      base-url: ${PARKIO_MEDIA_SERVICE_URI:http://localhost:8084}
      connect-timeout: ${PARKIO_MEDIA_CLIENT_CONNECT_TIMEOUT:2s}
      read-timeout: ${PARKIO_MEDIA_CLIENT_READ_TIMEOUT:5s}
  geocoding:
    # Forward geocoding (place text -> coordinates) for the /map search, proxied
    # through this service instead of called directly from the browser (ADR-014).
    provider:
      # Default is the public OpenStreetMap Nominatim endpoint (hosted-beta). Point
      # this at an SLA-backed provider for production; the adapter is swappable.
      base-url: ${PARKIO_GEOCODING_BASE_URL:https://nominatim.openstreetmap.org}
      # Nominatim's usage policy requires a descriptive User-Agent identifying the app.
      user-agent: ${PARKIO_GEOCODING_USER_AGENT:Parkio/1.0 (+https://parkio.app)}
      country-codes: ${PARKIO_GEOCODING_COUNTRY_CODES:tr}
      language: ${PARKIO_GEOCODING_LANGUAGE:tr}
      # Short timeouts: a slow provider degrades to "no suggestions" fast, never stalls.
      connect-timeout: ${PARKIO_GEOCODING_CONNECT_TIMEOUT:1s}
      read-timeout: ${PARKIO_GEOCODING_READ_TIMEOUT:3s}
    cache:
      positive-ttl: ${PARKIO_GEOCODING_CACHE_POSITIVE_TTL:24h}
      negative-ttl: ${PARKIO_GEOCODING_CACHE_NEGATIVE_TTL:5m}
  parking:
    search:
      # Tunable nearby-search defaults and caps (ai-context/02). Client-supplied
      # radius/limit above the max (or <= 0) are rejected with 400.
      default-radius-meters: 1000
      default-result-limit: 10
      max-radius-meters: 50000
      max-result-limit: 50
  kafka:
    # Topic provisioning via NewTopic beans (KafkaTopicsConfig). Replication factor is
    # configurable for production; 1 is the local/dev default (single-broker compose).
    provision-topics: true
    replication-factor: ${PARKIO_KAFKA_REPLICATION_FACTOR:1}
    moderation-consumer:
      enabled: ${PARKIO_MODERATION_CONSUMER_ENABLED:true}
    relay:
      # Outbox relay: publishes parking-spot events to parkio.parking.spot. Poll interval
      # and batch size are configurable; send-timeout bounds the per-row broker ack wait.
      enabled: true
      poll-interval-ms: 1000
      batch-size: 100
      send-timeout-ms: 10000

# Resilience for the outbound geocoding provider call (instance: geocoding). Isolates a
# third-party dependency so its slowness/outage can never destabilise parking-service:
# the rate limiter respects the provider's usage policy, the bulkhead caps concurrency,
# and the circuit breaker short-circuits sustained failures. Health indicators are off so
# a degraded geocoder (non-critical) never flips the service health to DOWN.
resilience4j:
  circuitbreaker:
    instances:
      geocoding:
        register-health-indicator: false
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
  bulkhead:
    instances:
      geocoding:
        # Max concurrent provider calls; extra callers fail fast and degrade to empty.
        max-concurrent-calls: ${PARKIO_GEOCODING_BULKHEAD_MAX_CONCURRENT:4}
        max-wait-duration: 0
  ratelimiter:
    instances:
      geocoding:
        # Outbound cap honoring Nominatim's ≤1 request/second policy. A short wait
        # smooths bursts; beyond it the call degrades rather than queueing threads.
        register-health-indicator: false
        limit-for-period: ${PARKIO_GEOCODING_RL_LIMIT_FOR_PERIOD:1}
        limit-refresh-period: ${PARKIO_GEOCODING_RL_REFRESH_PERIOD:1s}
        timeout-duration: ${PARKIO_GEOCODING_RL_TIMEOUT:500ms}
