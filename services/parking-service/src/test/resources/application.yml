# Test configuration: in-memory H2 (PostgreSQL compatibility), schema generated
# from the JPA entities, Flyway disabled. Keeps the build self-contained and fast
# (no Docker / Testcontainers / PostGIS required) per ai-context/08. The geospatial
# nearby query is PostGIS-specific and is exercised via unit tests against a fake
# repository, not against H2.
spring:
  datasource:
    url: jdbc:h2:mem:parkingdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: false

parkio:
  idempotency:
    ttl: 24h
  lifecycle:
    parking-expiry:
      enabled: false
    retention:
      outbox-enabled: false
      inbox-enabled: false
  gateway:
    internal-secret: test-only-parkio-gateway-internal-secret-0123456789
  media:
    client:
      # No media-service in tests: point at an unroutable local port; tests mock
      # the MediaAccessPort or exercise failure mapping explicitly.
      base-url: http://localhost:0
      connect-timeout: 1s
      read-timeout: 1s
  parking:
    search:
      default-radius-meters: 1000
      default-result-limit: 10
      max-radius-meters: 50000
      max-result-limit: 50
  kafka:
    # No broker in tests: skip topic provisioning and disable the outbox relay so the
    # context starts without Kafka (the relay poller / native query never runs).
    provision-topics: false
    moderation-consumer:
      enabled: false
    relay:
      enabled: false

# Tracing exports only at runtime; disabled in tests so no OTLP exporter starts.
management:
  tracing:
    enabled: false
