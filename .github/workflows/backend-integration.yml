# Testcontainers integration tests (the distributed guarantees that H2/mocks
# cannot prove: outbox relay + DLQ, inbox dedup, Kafka transport, PostGIS nearby
# search, MinIO presigned URLs). These spin up PostgreSQL/Kafka/MinIO containers,
# so they are kept OUT of the fast PR gate (`backend-ci.yml`).
#
# When it runs:
#  - pull_request: only when backend/build/docker paths change (path filter
#    below), so frontend-/docs-only PRs stay fast.
#  - schedule: nightly, to catch drift even on weeks with no backend PRs.
#  - workflow_dispatch: on demand from the Actions tab.
#
# `-Pparkio.integrationTest.requireDocker=true` makes the run FAIL FAST if the
# runner has no Docker daemon, instead of silently skipping every suite and
# reporting a false-green build. ubuntu-latest ships Docker out of the box.

name: Backend integration tests

on:
  pull_request:
    paths:
      - "services/**"
      - "buildSrc/**"
      - "gradle/**"
      - "build.gradle*"
      - "settings.gradle*"
      - "gradle.properties"
      - "docker/**"
      - ".github/workflows/backend-integration.yml"
  schedule:
    # 03:17 UTC nightly (off the hour to avoid the cron stampede).
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

# A new push to a PR cancels the previous (still-running) integration run.
concurrency:
  group: backend-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-test:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run Testcontainers integration tests
        run: ./gradlew --no-daemon integrationTest -Pparkio.integrationTest.requireDocker=true

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7
          if-no-files-found: ignore
