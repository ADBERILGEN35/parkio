# Backend quality gate: every PR (and every push to master) must compile and
# pass the unit-test suite (`./gradlew build` excludes the `integration` tag,
# so this job never needs Docker and stays fast).
#
# Testcontainers integration tests live in a SEPARATE workflow
# (`backend-integration.yml`): they run on PRs that touch backend/build/docker
# paths, nightly, and on demand. Keeping them out of this gate keeps PR builds
# fast and Docker-independent for docs-/frontend-only changes.

name: Backend CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# A new push to a PR cancels the previous (still-running) run — mirrors the other gates.
concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-build:
    name: Build & unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      # Supply-chain: fail the build if the committed Gradle wrapper jar is not an
      # unmodified official Gradle distribution (cheap, runs on every PR).
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build and run unit tests
        run: ./gradlew --no-daemon build

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests/**
            **/build/test-results/**
          retention-days: 7
          if-no-files-found: ignore
