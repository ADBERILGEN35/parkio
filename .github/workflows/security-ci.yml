# Practical security gates for Parkio. The policy is deliberately high-signal:
# secrets always fail, dependency scans fail on HIGH/CRITICAL, and representative
# container images fail on CRITICAL only while the baseline matures.
#
# CodeQL and Trivy SARIF upload publish to GitHub Code Scanning, which requires
# Code scanning (and, on private repos, GitHub Advanced Security) to be enabled.
# Those parts are gated behind the repository variable CODEQL_ENABLED so this
# workflow passes on a personal/private repo today and lights CodeQL up later,
# without code changes, once the repo moves to an org/GHAS:
#   set repository variable CODEQL_ENABLED=true (Settings -> Secrets and
#   variables -> Actions -> Variables) after enabling Code scanning.
# Scan reports are always published as build artifacts regardless of that gate.

env:
  TRIVY_IMAGE: aquasec/trivy:0.64.1
  TRIVY_CACHE_DIR: ${{ github.workspace }}/.cache/trivy

name: Security CI

on:
  pull_request:
  push:
    branches: [master]
  schedule:
    # Weekly drift check, early Monday UTC.
    - cron: "23 3 * * 1"
  workflow_dispatch:

# Least-privilege for the Code Scanning path. security-events: write is only
# consumed by the SARIF-upload steps, which are themselves gated on
# CODEQL_ENABLED; it is harmless (unused) while the gate is off.
permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: docker://zricethezav/gitleaks:v8.28.0
        with:
          args: >
            git
            --config /github/workspace/.gitleaks.toml
            --redact
            --report-format sarif
            --report-path /github/workspace/gitleaks.sarif
            --verbose
            /github/workspace

      - name: Upload gitleaks report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          if-no-files-found: ignore
          retention-days: 14

  codeql:
    name: CodeQL (${{ matrix.language }})
    # Gated: runs only once Code scanning / GHAS is available and the repo
    # variable CODEQL_ENABLED is set to "true". Otherwise the job is skipped
    # cleanly (green) and the summary job reports it as skipped.
    if: ${{ vars.CODEQL_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: autobuild
          - language: javascript-typescript
            build-mode: none
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Autobuild
        if: matrix.build-mode == 'autobuild'
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"

  dependencies:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticated ghcr pull avoids anonymous trivy-db rate limits
      # (TOOMANYREQUESTS) when fetching the vulnerability database.
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ env.TRIVY_IMAGE }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Show Trivy Docker image version
        run: |
          set -euo pipefail
          mkdir -p "$TRIVY_CACHE_DIR"
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version

      - name: Generate dependency vulnerability report
        run: |
          set -euo pipefail
          mkdir -p "$TRIVY_CACHE_DIR"
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version
          echo "Scan target: ."
          echo "Severity policy: report HIGH/CRITICAL fixable library vulnerabilities; do not fail this report step."
          echo "Output: trivy-dependencies.txt"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -w /work \
            "${TRIVY_IMAGE}" \
            fs . \
            --scanners vuln \
            --vuln-type library \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --output trivy-dependencies.txt \
            --exit-code 0 \
            --cache-dir /root/.cache/trivy

      - name: Block on dependency vulnerabilities
        run: |
          set -euo pipefail
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version
          echo "Scan target: ."
          echo "Severity policy: block on HIGH/CRITICAL fixable library vulnerabilities."
          echo "Output: trivy-dependencies.sarif"
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/work" \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -w /work \
            "${TRIVY_IMAGE}" \
            fs . \
            --scanners vuln \
            --vuln-type library \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-dependencies.sarif \
            --exit-code 1 \
            --cache-dir /root/.cache/trivy

      - name: Show dependency report on failure
        if: failure()
        run: |
          if [ -s trivy-dependencies.txt ]; then
            cat trivy-dependencies.txt
          else
            echo "No dependency table report was generated. Check the preceding Trivy command output."
          fi

      - name: Upload dependency SARIF to Code Scanning
        # Only when Code Scanning is available; harmless to skip otherwise.
        if: ${{ always() && vars.CODEQL_ENABLED == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-dependencies.sarif
          category: trivy-dependencies

      - name: Upload dependency report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-dependencies-reports
          path: |
            trivy-dependencies.txt
            trivy-dependencies.sarif
          if-no-files-found: ignore
          retention-days: 14

  container-images:
    name: Container scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        service:
          - ai-validation-service
          - analytics-service
          - auth-service
          - gamification-service
          - gateway-service
          - media-service
          - moderation-service
          - notification-service
          - parking-service
          - user-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Trivy database
        uses: actions/cache@v4
        with:
          path: ${{ env.TRIVY_CACHE_DIR }}
          key: trivy-db-${{ runner.os }}-${{ env.TRIVY_IMAGE }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Show Trivy Docker image version
        run: |
          set -euo pipefail
          mkdir -p "$TRIVY_CACHE_DIR"
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version

      - name: Ensure gradlew executable
        run: chmod +x gradlew

      - name: Build service image
        run: |
          docker build \
            -f services/${{ matrix.service }}/Dockerfile \
            -t parkio/${{ matrix.service }}:security-ci \
            .

      - name: Scan image for high and critical findings
        run: |
          set -euo pipefail
          mkdir -p "$TRIVY_CACHE_DIR"
          image_ref="parkio/${{ matrix.service }}:security-ci"
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version
          echo "Scan target: ${image_ref}"
          echo "Severity policy: report HIGH/CRITICAL image vulnerabilities; do not fail this report step."
          echo "Output: trivy-image-${{ matrix.service }}.txt"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${TRIVY_IMAGE}" \
            image "${image_ref}" \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --output trivy-image-${{ matrix.service }}.txt \
            --exit-code 0 \
            --cache-dir /root/.cache/trivy

      - name: Block on critical image findings
        run: |
          set -euo pipefail
          image_ref="parkio/${{ matrix.service }}:security-ci"
          echo "Docker version:"
          docker version
          echo "Selected Trivy image: ${TRIVY_IMAGE}"
          docker run --rm "${TRIVY_IMAGE}" --version
          echo "Scan target: ${image_ref}"
          echo "Severity policy: block on CRITICAL image vulnerabilities."
          echo "Output: trivy-image-${{ matrix.service }}.sarif"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${TRIVY_CACHE_DIR}:/root/.cache/trivy" \
            -v "${GITHUB_WORKSPACE}:/work" \
            -w /work \
            "${TRIVY_IMAGE}" \
            image "${image_ref}" \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image-${{ matrix.service }}.sarif \
            --exit-code 1 \
            --cache-dir /root/.cache/trivy

      - name: Show image report on failure
        if: failure()
        run: |
          report="trivy-image-${{ matrix.service }}.txt"
          if [ -s "$report" ]; then
            cat "$report"
          else
            echo "No image table report was generated. Check the preceding Trivy command output."
          fi

      - name: Upload image SARIF to Code Scanning
        if: ${{ always() && vars.CODEQL_ENABLED == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image-${{ matrix.service }}.sarif
          category: trivy-image-${{ matrix.service }}

      - name: Upload image report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-${{ matrix.service }}-reports
          path: |
            trivy-image-${{ matrix.service }}.txt
            trivy-image-${{ matrix.service }}.sarif
          if-no-files-found: ignore
          retention-days: 14

  summary:
    name: Security CI summary
    runs-on: ubuntu-latest
    if: always()
    needs: [secrets, codeql, dependencies, container-images]
    steps:
      - name: Write summary
        env:
          SECRETS_RESULT: ${{ needs.secrets.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          DEPENDENCIES_RESULT: ${{ needs.dependencies.result }}
          CONTAINER_RESULT: ${{ needs.container-images.result }}
          CODEQL_ENABLED: ${{ vars.CODEQL_ENABLED }}
        run: |
          if [ "${CODEQL_ENABLED}" = "true" ]; then
            codeql_line="**enabled** (result: ${CODEQL_RESULT}) — SARIF uploaded to Code Scanning"
          else
            codeql_line="**skipped** (CODEQL_ENABLED is not \"true\"; Code Scanning unavailable on this repo)"
          fi

          {
            echo "## Security CI summary"
            echo ""
            echo "| Gate | Policy | Result |"
            echo "| --- | --- | --- |"
            echo "| Secret scan (gitleaks) | blocking — fails on any detected secret | ${SECRETS_RESULT} |"
            echo "| Trivy dependency scan | blocking — fails on HIGH/CRITICAL fixable library vulns | ${DEPENDENCIES_RESULT} |"
            echo "| Trivy container scan | reporting HIGH/CRITICAL; blocking on CRITICAL image vulns | ${CONTAINER_RESULT} |"
            echo "| CodeQL (SAST) | ${codeql_line} |  |"
            echo ""
            echo "All scan reports are published as workflow artifacts regardless of CodeQL state."
            echo ""
            echo "### How to enable CodeQL"
            echo "1. Move the repo to an organization, or enable GitHub Advanced Security on it."
            echo "2. Enable **Settings -> Code security and analysis -> Code scanning**."
            echo "3. Add repository variable **CODEQL_ENABLED=true** (Settings -> Secrets and variables -> Actions -> Variables)."
            echo "4. Re-run Security CI."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail summary if a required gate failed
        env:
          SECRETS_RESULT: ${{ needs.secrets.result }}
          CODEQL_RESULT: ${{ needs.codeql.result }}
          DEPENDENCIES_RESULT: ${{ needs.dependencies.result }}
          CONTAINER_RESULT: ${{ needs.container-images.result }}
        run: |
          # codeql may legitimately be "skipped" (gate off) — that is not a failure.
          fail=0
          for r in "$SECRETS_RESULT" "$DEPENDENCIES_RESULT" "$CONTAINER_RESULT"; do
            if [ "$r" != "success" ]; then fail=1; fi
          done
          if [ "$CODEQL_RESULT" = "failure" ]; then fail=1; fi
          if [ "$fail" -eq 1 ]; then
            echo "::error::One or more Security CI gates failed. See the job summary."
            exit 1
          fi
          echo "All required Security CI gates passed."
