apiVersion: 1

# Auto-provisioned observability datasources (reachable over the observability network).
datasources:
  - name: Prometheus
    # Stable uid so provisioned dashboards can reference it portably.
    uid: parkio-prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
  - name: Loki
    uid: parkio-loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      # Logs -> Traces: each service logs `traceId=<otel-hex>` (see logging.pattern.level).
      # Grafana turns that token into a clickable link that opens the trace in Tempo,
      # completing the Loki <-> Tempo correlation.
      derivedFields:
        - name: TraceID
          matcherRegex: "traceId=(\\w+)"
          url: "${__value.raw}"
          datasourceUid: parkio-tempo
  - name: Tempo
    uid: parkio-tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      # Trace -> Logs: jump from a span to the matching Loki logs for that service/trace.
      tracesToLogsV2:
        datasourceUid: parkio-loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service
      # Trace -> Metrics and the service dependency graph are backed by the span/service-graph
      # metrics Tempo's metrics-generator remote-writes into Prometheus.
      tracesToMetrics:
        datasourceUid: parkio-prometheus
      serviceMap:
        datasourceUid: parkio-prometheus
      nodeGraph:
        enabled: true
