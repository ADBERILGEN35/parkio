apiVersion: 1

# Drop Grafana dashboard JSON files into ./grafana/provisioning/dashboards/ and
# they will be loaded automatically. Bundled: parkio-hosted-beta.json
# ("Parkio — Hosted Beta Overview").
providers:
  - name: parkio
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: true
