# Parkio — local development INFRASTRUCTURE.
#
# Brings up every backing service the Parkio microservices need: one PostgreSQL
# instance PER service (database-per-service, see docs/ai-context/05), Redis,
# Kafka (KRaft mode — no Zookeeper), Kafka Exporter, MinIO, Prometheus,
# Alertmanager, Loki, Promtail and Grafana.
#
# Run from this directory (docker/):
#   cp .env.example .env
#   docker compose up -d
#
# To also run the application services, add the apps overlay:
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d
#
# All credentials/ports come from .env — nothing secret is committed (ai-context/07).

name: parkio

# --------------------------------------------------------------------------- #
# Reusable fragments                                                          #
# --------------------------------------------------------------------------- #

# Bounded container logs. Docker's json-file driver is UNBOUNDED by default, so any
# long-running container can silently fill the host disk. Cap each at 50 MB (5 × 10 MB,
# rotated). Promtail still ships everything to Loki, which owns durable retention.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

x-postgres-common: &postgres-common
  image: ${POSTGRES_IMAGE:-postgres:16-alpine}
  restart: unless-stopped
  logging: *default-logging
  networks: [parkio-backend]
  # POSTGRES_USER / POSTGRES_DB are resolved inside the container, hence $$.
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 10s
    timeout: 5s
    retries: 5
    start_period: 10s
  # Sensible local resource hints; tune in .env if needed.
  shm_size: 128mb

services:
  # ------------------------------------------------------------------------- #
  # Databases — one per service. Services NEVER share a database (ai-context). #
  # ------------------------------------------------------------------------- #
  postgres-auth:
    <<: *postgres-common
    container_name: parkio-postgres-auth
    environment:
      POSTGRES_DB: ${POSTGRES_AUTH_DB:-parkio_auth}
      POSTGRES_USER: ${POSTGRES_AUTH_USER:-parkio_auth}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD:?set POSTGRES_AUTH_PASSWORD in .env}
    ports: ["${POSTGRES_AUTH_PORT:-5432}:5432"]
    volumes: ["postgres-auth-data:/var/lib/postgresql/data"]

  postgres-user:
    <<: *postgres-common
    container_name: parkio-postgres-user
    environment:
      POSTGRES_DB: ${POSTGRES_USER_DB:-parkio_user}
      POSTGRES_USER: ${POSTGRES_USER_USER:-parkio_user}
      POSTGRES_PASSWORD: ${POSTGRES_USER_PASSWORD:?set POSTGRES_USER_PASSWORD in .env}
    ports: ["${POSTGRES_USER_PORT:-5433}:5432"]
    volumes: ["postgres-user-data:/var/lib/postgresql/data"]

  # parking-service needs PostGIS for geospatial spot search (ai-context/05).
  postgres-parking:
    <<: *postgres-common
    image: ${POSTGIS_IMAGE:-postgis/postgis:16-3.4}
    container_name: parkio-postgres-parking
    environment:
      POSTGRES_DB: ${POSTGRES_PARKING_DB:-parkio_parking}
      POSTGRES_USER: ${POSTGRES_PARKING_USER:-parkio_parking}
      POSTGRES_PASSWORD: ${POSTGRES_PARKING_PASSWORD:?set POSTGRES_PARKING_PASSWORD in .env}
    ports: ["${POSTGRES_PARKING_PORT:-5434}:5432"]
    volumes: ["postgres-parking-data:/var/lib/postgresql/data"]

  postgres-media:
    <<: *postgres-common
    container_name: parkio-postgres-media
    environment:
      POSTGRES_DB: ${POSTGRES_MEDIA_DB:-parkio_media}
      POSTGRES_USER: ${POSTGRES_MEDIA_USER:-parkio_media}
      POSTGRES_PASSWORD: ${POSTGRES_MEDIA_PASSWORD:?set POSTGRES_MEDIA_PASSWORD in .env}
    ports: ["${POSTGRES_MEDIA_PORT:-5435}:5432"]
    volumes: ["postgres-media-data:/var/lib/postgresql/data"]

  postgres-gamification:
    <<: *postgres-common
    container_name: parkio-postgres-gamification
    environment:
      POSTGRES_DB: ${POSTGRES_GAMIFICATION_DB:-parkio_gamification}
      POSTGRES_USER: ${POSTGRES_GAMIFICATION_USER:-parkio_gamification}
      POSTGRES_PASSWORD: ${POSTGRES_GAMIFICATION_PASSWORD:?set POSTGRES_GAMIFICATION_PASSWORD in .env}
    ports: ["${POSTGRES_GAMIFICATION_PORT:-5436}:5432"]
    volumes: ["postgres-gamification-data:/var/lib/postgresql/data"]

  postgres-notification:
    <<: *postgres-common
    container_name: parkio-postgres-notification
    environment:
      POSTGRES_DB: ${POSTGRES_NOTIFICATION_DB:-parkio_notification}
      POSTGRES_USER: ${POSTGRES_NOTIFICATION_USER:-parkio_notification}
      POSTGRES_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD:?set POSTGRES_NOTIFICATION_PASSWORD in .env}
    ports: ["${POSTGRES_NOTIFICATION_PORT:-5437}:5432"]
    volumes: ["postgres-notification-data:/var/lib/postgresql/data"]

  postgres-moderation:
    <<: *postgres-common
    container_name: parkio-postgres-moderation
    environment:
      POSTGRES_DB: ${POSTGRES_MODERATION_DB:-parkio_moderation}
      POSTGRES_USER: ${POSTGRES_MODERATION_USER:-parkio_moderation}
      POSTGRES_PASSWORD: ${POSTGRES_MODERATION_PASSWORD:?set POSTGRES_MODERATION_PASSWORD in .env}
    ports: ["${POSTGRES_MODERATION_PORT:-5438}:5432"]
    volumes: ["postgres-moderation-data:/var/lib/postgresql/data"]

  postgres-analytics:
    <<: *postgres-common
    container_name: parkio-postgres-analytics
    environment:
      POSTGRES_DB: ${POSTGRES_ANALYTICS_DB:-parkio_analytics}
      POSTGRES_USER: ${POSTGRES_ANALYTICS_USER:-parkio_analytics}
      POSTGRES_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD:?set POSTGRES_ANALYTICS_PASSWORD in .env}
    ports: ["${POSTGRES_ANALYTICS_PORT:-5439}:5432"]
    volumes: ["postgres-analytics-data:/var/lib/postgresql/data"]

  # ai-validation-service owns its own database: it persists advisory results via
  # Flyway migrations + JPA entities (database-per-service, ai-context/05).
  postgres-ai-validation:
    <<: *postgres-common
    container_name: parkio-postgres-ai-validation
    environment:
      POSTGRES_DB: ${POSTGRES_AIVALIDATION_DB:-parkio_aivalidation}
      POSTGRES_USER: ${POSTGRES_AIVALIDATION_USER:-parkio_aivalidation}
      POSTGRES_PASSWORD: ${POSTGRES_AIVALIDATION_PASSWORD:?set POSTGRES_AIVALIDATION_PASSWORD in .env}
    ports: ["${POSTGRES_AIVALIDATION_PORT:-5440}:5432"]
    volumes: ["postgres-ai-validation-data:/var/lib/postgresql/data"]

  # ------------------------------------------------------------------------- #
  # Redis — cache, distributed locks, idempotency keys, rate limiting.        #
  # ------------------------------------------------------------------------- #
  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    container_name: parkio-redis
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes"]
    ports: ["${REDIS_PORT:-6379}:6379"]
    volumes: ["redis-data:/data"]
    networks: [parkio-backend]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ------------------------------------------------------------------------- #
  # Kafka — KRaft mode (single combined broker+controller, no Zookeeper).     #
  # Internal listener kafka:9092 for containers; host listener on :29092.     #
  # ------------------------------------------------------------------------- #
  kafka:
    image: ${KAFKA_IMAGE:-confluentinc/cp-kafka:7.7.1}
    container_name: parkio-kafka
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${KAFKA_EXTERNAL_PORT:-29092}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-node dev defaults — not for production clusters.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes: ["kafka-data:/var/lib/kafka/data"]
    networks: [parkio-backend]
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka-exporter:
    image: ${KAFKA_EXPORTER_IMAGE:-danielqsj/kafka-exporter:v1.8.0}
    container_name: parkio-kafka-exporter
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - --kafka.server=kafka:9092
      - --web.listen-address=:9308
      - --topic.filter=^parkio\..*
      - --group.filter=^.*-service
    ports: ["127.0.0.1:${KAFKA_EXPORTER_PORT:-9308}:9308"]
    networks: [parkio-backend, parkio-observability]

  # ------------------------------------------------------------------------- #
  # MinIO — S3-compatible object storage for media bytes (media-service only).#
  # ------------------------------------------------------------------------- #
  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2024-09-13T20-26-02Z}
    container_name: parkio-minio
    restart: unless-stopped
    logging: *default-logging
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parkio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web console
    volumes: ["minio-data:/data"]
    networks: [parkio-backend]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot: create the media bucket so media-service has somewhere to write.
  minio-setup:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2024-09-16T17-43-14Z}
    container_name: parkio-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-parkio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in .env}
      MINIO_BUCKET: ${MINIO_BUCKET:-parkio-media}
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET" &&
        mc anonymous set none "local/$$MINIO_BUCKET" &&
        echo "MinIO bucket '$$MINIO_BUCKET' ready."
    networks: [parkio-backend]
    restart: "no"

  # ------------------------------------------------------------------------- #
  # ClamAV — anti-malware daemon (clamd over TCP) used by media-service to     #
  # scan uploaded image bytes BEFORE they are stored or served. media-service  #
  # fails closed if it cannot reach clamd, so it depends on this being healthy.#
  # First start downloads the virus DB (freshclam) — allow a long start_period.#
  # ------------------------------------------------------------------------- #
  clamav:
    image: ${CLAMAV_IMAGE:-clamav/clamav:1.4}
    container_name: parkio-clamav
    restart: unless-stopped
    logging: *default-logging
    # clamd listens on 3310; exposed on the host for local dev only (the
    # hosted-beta overlay removes this mapping — clamd stays on the private net).
    ports:
      - "${CLAMAV_PORT:-3310}:3310"
    volumes: ["clamav-data:/var/lib/clamav"]
    networks: [parkio-backend]
    healthcheck:
      # clamdcheck.sh PINGs clamd; only healthy once the DB is loaded and clamd is up.
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      # Virus-DB download + clamd load can take a couple of minutes on first boot.
      start_period: 180s

  # ------------------------------------------------------------------------- #
  # Observability — Prometheus scrapes metrics; Alertmanager routes alerts;   #
  # Loki stores logs; Promtail ships Docker logs; Grafana displays both.       #
  # ------------------------------------------------------------------------- #
  prometheus:
    image: ${PROMETHEUS_IMAGE:-prom/prometheus:v2.54.1}
    container_name: parkio-prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      # Accept Tempo's metrics-generator remote_write (span + service-graph metrics that
      # power Grafana's service dependency graph). Exemplar storage links metrics->traces.
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
    ports: ["${PROMETHEUS_PORT:-9090}:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    # On both networks: backend to scrape services, observability to serve Grafana.
    networks: [parkio-backend, parkio-observability]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  alertmanager:
    image: ${ALERTMANAGER_IMAGE:-prom/alertmanager:v0.27.0}
    container_name: parkio-alertmanager
    restart: unless-stopped
    logging: *default-logging
    environment:
      PARKIO_ALERT_SLACK_WEBHOOK_URL: ${PARKIO_ALERT_SLACK_WEBHOOK_URL:-}
      PARKIO_ALERT_SLACK_CHANNEL: "${PARKIO_ALERT_SLACK_CHANNEL:-#parkio-alerts}"
      PARKIO_ALERT_REPEAT_CRITICAL: ${PARKIO_ALERT_REPEAT_CRITICAL:-1h}
      PARKIO_ALERT_REPEAT_WARNING: ${PARKIO_ALERT_REPEAT_WARNING:-4h}
    entrypoint: ["/bin/sh", "/etc/alertmanager/render-config.sh"]
    ports: ["127.0.0.1:${ALERTMANAGER_PORT:-9093}:9093"]
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./alertmanager/render-config.sh:/etc/alertmanager/render-config.sh:ro
      - alertmanager-data:/alertmanager
    networks: [parkio-observability]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  loki:
    image: ${LOKI_IMAGE:-grafana/loki:2.9.8}
    container_name: parkio-loki
    restart: unless-stopped
    logging: *default-logging
    command:
      - -config.file=/etc/loki/loki.yml
      - -config.expand-env=true
    environment:
      PARKIO_LOKI_RETENTION_PERIOD: ${PARKIO_LOKI_RETENTION_PERIOD:-168h}
    ports: ["127.0.0.1:${LOKI_PORT:-3100}:3100"]
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks: [parkio-observability]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  promtail:
    image: ${PROMTAIL_IMAGE:-grafana/promtail:2.9.8}
    container_name: parkio-promtail
    restart: unless-stopped
    logging: *default-logging
    command:
      - -config.file=/etc/promtail/promtail.yml
      - -config.expand-env=true
    environment:
      PARKIO_ENVIRONMENT: ${PARKIO_ENVIRONMENT:-local}
    depends_on:
      loki:
        condition: service_healthy
    ports: ["127.0.0.1:${PROMTAIL_PORT:-9080}:9080"]
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp
    networks: [parkio-observability]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # node-exporter — HOST-level metrics (CPU, memory, disk, filesystem, inodes) for the VPS
  # the beta runs on. Mounts host /proc, /sys and / READ-ONLY and reports through
  # --path.rootfs so filesystem mountpoints read as the host sees them (e.g. mountpoint="/").
  # No public exposure: published loopback-only for admin/debug; Prometheus scrapes it
  # in-network as node-exporter:9100. The image is a from-scratch binary (no shell/wget), so
  # like Tempo it carries no container healthcheck — liveness is observed via up{job=...}.
  node-exporter:
    image: ${NODE_EXPORTER_IMAGE:-prom/node-exporter:v1.8.2}
    container_name: parkio-node-exporter
    restart: unless-stopped
    logging: *default-logging
    # Host PID namespace lets the exporter see all host processes for accurate counts.
    pid: host
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/host/root
      # Drop pseudo/bind/overlay mounts so disk alerts track real host filesystems (e.g. "/").
      - --collector.filesystem.mount-points-exclude=^/(host/(dev|proc|sys)|dev|proc|sys|run/.+|var/lib/docker/.+)($$|/)
      - --collector.filesystem.fs-types-exclude=^(tmpfs|overlay|squashfs|fuse.*|autofs|devtmpfs|nsfs|cgroup.*|mqueue|proc|sysfs|tracefs|bpf|debugfs)$$
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
    ports: ["127.0.0.1:${NODE_EXPORTER_PORT:-9100}:9100"]
    # Observability network only: Prometheus scrapes it; it needs no backend/data access.
    networks: [parkio-observability]

  # Grafana Tempo — distributed-trace store. Receives OTLP spans from the services on the
  # backend network; Grafana queries it on the observability network (same dual-network
  # pattern as Prometheus). OTLP receivers (4317/4318) are NEVER published; the query/admin
  # API (3200) is published loopback-only by the hosted-beta overlay. No healthcheck: the
  # distroless Tempo image ships no shell/wget, so readiness is left to /ready probes in
  # Grafana. The OTLP exporter in each service is fire-and-forget, so a late Tempo never
  # blocks app startup.
  tempo:
    image: ${TEMPO_IMAGE:-grafana/tempo:2.6.1}
    container_name: parkio-tempo
    restart: unless-stopped
    logging: *default-logging
    command:
      - -config.file=/etc/tempo/tempo.yml
      - -config.expand-env=true
    environment:
      PARKIO_TEMPO_RETENTION: ${PARKIO_TEMPO_RETENTION:-48h}
    ports: ["127.0.0.1:${TEMPO_PORT:-3200}:3200"]
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo-data:/var/tempo
    # Both networks: backend to receive OTLP from services, observability to serve Grafana
    # and to remote_write generated metrics to Prometheus.
    networks: [parkio-backend, parkio-observability]

  grafana:
    image: ${GRAFANA_IMAGE:-grafana/grafana:11.2.0}
    container_name: parkio-grafana
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
      tempo:
        condition: service_started
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks: [parkio-observability]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# --------------------------------------------------------------------------- #
# Named volumes — persist data across `docker compose down` (not `down -v`).  #
# --------------------------------------------------------------------------- #
volumes:
  postgres-auth-data:
  postgres-user-data:
  postgres-parking-data:
  postgres-media-data:
  postgres-gamification-data:
  postgres-notification-data:
  postgres-moderation-data:
  postgres-analytics-data:
  postgres-ai-validation-data:
  redis-data:
  kafka-data:
  minio-data:
  clamav-data:
  prometheus-data:
  alertmanager-data:
  loki-data:
  promtail-positions:
  tempo-data:
  grafana-data:

# --------------------------------------------------------------------------- #
# Dedicated networks — data/messaging plane vs observability plane.           #
# --------------------------------------------------------------------------- #
networks:
  parkio-backend:
    name: parkio-backend
    driver: bridge
  parkio-observability:
    name: parkio-observability
    driver: bridge
