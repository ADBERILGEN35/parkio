# Prometheus scrape configuration for the Parkio local stack.
#
# Service targets are resolved over the parkio-backend Docker network. Every service
# ships `micrometer-registry-prometheus` and exposes /actuator/prometheus (see
# docs/architecture/observability-metrics.md for the metric catalogue).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: parkio-local

# Alert rules (docker/prometheus/alerts.yml, mounted at /etc/prometheus/alerts.yml).
# Absolute path: Prometheus resolves rule_files against its working directory, not the
# config dir. Rules evaluate and route through Alertmanager.
rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: parkio-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-service:8080"]
        labels: { service: gateway-service }
      - targets: ["auth-service:8081"]
        labels: { service: auth-service }
      - targets: ["user-service:8082"]
        labels: { service: user-service }
      - targets: ["parking-service:8083"]
        labels: { service: parking-service }
      - targets: ["media-service:8084"]
        labels: { service: media-service }
      - targets: ["gamification-service:8085"]
        labels: { service: gamification-service }
      - targets: ["notification-service:8086"]
        labels: { service: notification-service }
      - targets: ["moderation-service:8087"]
        labels: { service: moderation-service }
      - targets: ["ai-validation-service:8088"]
        labels: { service: ai-validation-service }
      - targets: ["analytics-service:8089"]
        labels: { service: analytics-service }

  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
        labels: { service: kafka-exporter }
