# Parkio — Prometheus alert rules (hosted-beta baseline).
#
# Thresholds are sized for a small, single-VPS beta (low traffic, RF=1 Kafka, single-node
# DBs) — they detect production-impacting failure, not micro-optimisation. Tune per traffic.
#
# Prometheus routes firing alerts to Alertmanager (see docker/prometheus/prometheus.yml).
# Hosted beta uses Alertmanager's no-op receiver unless PARKIO_ALERT_SLACK_WEBHOOK_URL
# is configured in the environment.
#
# Metric catalogue: docs/architecture/observability-metrics.md. Counters render with a
# `_total` suffix; dots become underscores (parkio.outbox.deadlettered.count ->
# parkio_outbox_deadlettered_count).

groups:
  # ===================================================================== #
  # CRITICAL — page-worthy: something is down or data delivery is failing. #
  # ===================================================================== #
  - name: parkio-critical
    rules:
      - alert: ServiceDown
        # A scrape target has been unreachable for 2m (crash, OOM, deadlock, network).
        expr: up{job="parkio-services"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.service }} is down"
          description: "Prometheus cannot scrape {{ $labels.service }} ({{ $labels.instance }}) for >2m. Check `docker compose ps` and the service logs."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--servicedown"

      - alert: GatewayHigh5xxRate
        # >5% of edge responses are 5xx over 5m, sustained 10m. clamp_min avoids div-by-zero
        # at low traffic (and keeps the ratio meaningless-but-safe when there are no requests).
        expr: |
          sum(rate(http_server_requests_seconds_count{service="gateway-service",status=~"5.."}[5m]))
            / clamp_min(sum(rate(http_server_requests_seconds_count{service="gateway-service"}[5m])), 1)
            > 0.05
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Gateway 5xx rate is high"
          description: "More than 5% of gateway responses are 5xx over the last 5m. A downstream service is likely failing — check ServiceDown and per-service 5xx."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--gatewayhigh5xxrate"

      - alert: OutboxDeadlettered
        # Any dead-lettered (poison) outbox row is actionable: a publish permanently failed
        # parkio.kafka.relay.max-attempts times. See the runbook in observability-metrics.md.
        expr: parkio_outbox_deadlettered_count > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Dead-lettered outbox rows in {{ $labels.service }}"
          description: "{{ $labels.service }} has {{ $value }} dead-lettered outbox row(s). Events are NOT being published. Follow the OutboxDeadlettered runbook (inspect failure_reason, fix, redrive)."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--outboxdeadlettered"

      - alert: OutboxOldestUnpublishedTooOld
        # The oldest relayable row is older than 5m -> the relay is not draining to Kafka
        # (broker down/unreachable, relay stopped). Backlog count alone can be high under
        # legitimate load, so age is the better "stuck" signal.
        expr: parkio_outbox_oldest_unpublished_age_seconds > 300
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Outbox not draining in {{ $labels.service }}"
          description: "Oldest unpublished outbox row in {{ $labels.service }} is {{ $value | humanizeDuration }} old. Check Kafka health and the relay logs."

      - alert: DatabaseConnectionPoolExhausted
        # Threads are blocked waiting for a HikariCP connection for 5m -> pool exhausted
        # (slow queries, leak, or undersized pool). Gateway has no datasource (no series).
        expr: hikaricp_connections_pending > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "DB pool exhausted in {{ $labels.service }} (pool {{ $labels.pool }})"
          description: "{{ $value }} thread(s) waiting for a DB connection in {{ $labels.service }} for >5m. Check for slow queries / connection leaks or raise the pool size."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--databaseconnectionpoolexhausted"

      - alert: KafkaExporterDown
        # Without the exporter, consumer lag and DLT depth are blind.
        expr: up{job="kafka-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka exporter is down"
          description: "Prometheus cannot scrape kafka-exporter for >2m. Kafka lag and DLT-depth alerts are unavailable until the exporter is restored."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--kafkaexporterdown"

      - alert: KafkaBrokerUnavailable
        # danielqsj/kafka-exporter exposes kafka_brokers as the broker count it can see.
        expr: kafka_brokers < 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kafka exporter sees no brokers"
          description: "Kafka exporter is reachable but reports zero Kafka brokers. Check parkio-kafka health, listener config, and exporter broker address kafka:9092."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--kafkabrokerunavailable"

      - alert: KafkaDltMessagesPresent
        # DLT topics are delete-retention topics, so retained offset depth is a practical
        # broker-side proxy for poison records awaiting inspection/redrive.
        expr: |
          sum by (topic) (
            kafka_topic_partition_current_offset{topic=~"parkio\\.dlt\\..+"}
              - kafka_topic_partition_oldest_offset{topic=~"parkio\\.dlt\\..+"}
          ) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Kafka DLT topic {{ $labels.topic }} has retained messages"
          description: "{{ $labels.topic }} has retained offset depth {{ $value }} for >5m. A consumer poison message was routed to its DLT; inspect and redrive or archive deliberately."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--kafkadltmessagespresent"

      - alert: OutboxDeadletterAgeHigh
        # A dead-letter row that remains open for hours means inspection/redrive/acknowledgment
        # did not happen. Acknowledged rows are excluded from this metric.
        expr: parkio_outbox_deadlettered_oldest_age_seconds > 21600
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "Old outbox dead-letter in {{ $labels.service }}"
          description: "The oldest open dead-lettered outbox row in {{ $labels.service }} is {{ $value | humanizeDuration }} old. Inspect with scripts/outbox-deadletter-recovery.sh and retry or acknowledge deliberately."
          runbook_url: "docs/operations/dlq-redrive-runbook.md"

      - alert: KafkaConsumerLagSustained
        # Sustained high average lag indicates a stuck/underprovisioned consumer, not just a burst.
        expr: |
          max by (consumergroup, topic) (
            avg_over_time(kafka_consumergroup_lag{consumergroup=~".*-service",topic=~"parkio\\..+"}[30m])
          ) > 1000
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Kafka consumer lag sustained for {{ $labels.consumergroup }} on {{ $labels.topic }}"
          description: "{{ $labels.consumergroup }} has averaged >1000 messages of lag on {{ $labels.topic }} for at least 30m. User-visible projections may be stale."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--kafkaconsumerlagsustained"

  # ===================================================================== #
  # WARNING — investigate soon; not necessarily an outage.                 #
  # ===================================================================== #
  - name: parkio-warning
    rules:
      - alert: HighJvmMemoryUsage
        # Heap >90% for 10m. `> 0` filter drops pools that report max=-1 (undefined).
        expr: |
          sum by (service) (jvm_memory_used_bytes{area="heap"})
            / clamp_min(sum by (service) (jvm_memory_max_bytes{area="heap"} > 0), 1)
            > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High heap usage in {{ $labels.service }}"
          description: "{{ $labels.service }} heap is above 90% of max for >10m. Risk of GC thrash / OOM — review memory limits (JAVA_TOOL_OPTIONS MaxRAMPercentage) and load."

      - alert: OutboxPublishFailuresElevated
        # The relay is failing to publish rows (transient broker/network errors) well before
        # they exhaust parkio.kafka.relay.max-attempts and dead-letter. A sustained failure
        # rate means delivery is degraded even if no row has hit the DLQ yet — an early signal
        # that pairs with the critical OutboxDeadlettered (which only fires post-DLQ).
        expr: sum by (service) (rate(parkio_outbox_publish_failed_total[5m])) > 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Outbox publish failures elevated in {{ $labels.service }}"
          description: "{{ $labels.service }} outbox relay is failing to publish (~{{ $value | humanize }}/s over 5m). Rows are being retried; check Kafka health and relay logs before they dead-letter."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--outboxdeadlettered"

      - alert: OutboxRedriveStillDeadlettered
        # If operators retried rows but open dead-letters remain, the fix did not work or
        # another poison row appeared. This catches repeated/manual recovery failures.
        expr: |
          increase(parkio_outbox_recovery_retry_count[1h]) > 0
            and on (service) parkio_outbox_deadlettered_count > 0
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Outbox redrive did not clear dead-letters in {{ $labels.service }}"
          description: "{{ $labels.service }} recorded retry actions in the last hour but still has open dead-lettered rows. Stop repeated retries; inspect the failure reason and escalate to a code/config fix if unchanged."
          runbook_url: "docs/operations/dlq-redrive-runbook.md"

      - alert: MediaUploadFailuresHigh
        # >50% of upload attempts rejected over 15m -> client/integration breakage (some
        # rejects are normal validation, a sustained majority is not).
        expr: |
          sum(rate(parkio_media_rejected_count_total[15m]))
            / clamp_min(
                sum(rate(parkio_media_rejected_count_total[15m]))
                + sum(rate(parkio_media_upload_count_total[15m])), 1)
            > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Most media uploads are being rejected"
          description: "Over 50% of media upload attempts were rejected in the last 15m. Check validation rules, client behaviour, and media-service logs."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--mediauploadfailureshigh"

      - alert: AuthLoginFailuresHigh
        # Sustained high absolute login-failure rate (>0.2/s ~= 12/min) for 10m -> likely
        # credential stuffing or a broken login path. Ratio-based would under-fire at the
        # very low volumes typical of a closed beta, so this uses an absolute rate.
        expr: sum(rate(parkio_auth_login_failure_count_total[5m])) > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Elevated login failures"
          description: "Login failures exceed ~12/min over 10m. Possible credential stuffing or an auth outage — correlate with GatewayRateLimitSpike and auth-service logs."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--authloginfailureshigh"

      - alert: GatewayRateLimitSpike
        # >1/s (~60/min) requests rejected with 429 for 10m -> abuse or misconfigured limits.
        expr: sum(rate(parkio_gateway_rate_limit_rejected_count_total[5m])) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Gateway is rejecting many requests (429)"
          description: "The edge rate limiter is rejecting >60 req/min over 10m. Investigate abuse, a noisy client, or limits that are too tight (PARKIO_RL_* envs)."

      - alert: NotificationDeliveryFailuresHigh
        # >50% of delivery attempts fail over 15m -> provider/credential/integration issue.
        expr: |
          sum(rate(parkio_notification_delivery_worker_failure_count_total[15m]))
            / clamp_min(
                sum(rate(parkio_notification_delivery_worker_failure_count_total[15m]))
                + sum(rate(parkio_notification_delivery_worker_success_count_total[15m])), 1)
            > 0.5
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Notification delivery failure rate is high"
          description: "Over 50% of notification delivery attempts failed in the last 15m. Check the delivery provider/credentials and notification-service logs."

      - alert: KafkaConsumerLagHigh
        # Beta-sized early warning. The sustained critical alert above handles longer outages.
        expr: |
          max by (consumergroup, topic) (
            kafka_consumergroup_lag{consumergroup=~".*-service",topic=~"parkio\\..+"}
          ) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Kafka consumer lag is high for {{ $labels.consumergroup }} on {{ $labels.topic }}"
          description: "{{ $labels.consumergroup }} has >100 messages of lag on {{ $labels.topic }} for >10m. Check the consumer logs before it becomes a sustained backlog."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--kafkaconsumerlaghigh"

  # ===================================================================== #
  # HOST — single-VPS saturation/exhaustion (node_exporter, job=node-exporter). #
  # The beta runs on one box, so disk/inode/memory/CPU pressure is a direct  #
  # production risk. Filesystem rules target REAL host filesystems only      #
  # (pseudo/overlay/bind mounts are dropped by node-exporter's collector     #
  # excludes). See docs/architecture/observability-metrics.md for runbooks.  #
  # ===================================================================== #
  - name: parkio-host
    rules:
      - alert: NodeExporterDown
        # Without node-exporter, all host disk/memory/CPU alerts below are blind.
        expr: up{job="node-exporter"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Host node-exporter is down"
          description: "Prometheus cannot scrape node-exporter for >2m. Host disk/memory/CPU/inode alerts are unavailable until it is restored. Check `docker compose ps node-exporter`."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--nodeexporterdown"

      - alert: HostFilesystemReadOnly
        # A filesystem flipped read-only almost always means disk/IO failure or corruption —
        # writes (DB, outbox, uploads, logs) are failing right now.
        expr: node_filesystem_readonly{fstype!~"tmpfs|overlay|squashfs"} == 1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Host filesystem {{ $labels.mountpoint }} is read-only"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} is mounted read-only. The disk is likely failing or was remounted ro after an error — host writes are failing. Investigate `dmesg`, disk health, and remount immediately."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostfilesystemreadonly"

      - alert: HostDiskSpaceCritical
        # <10% free on a real filesystem -> imminent write failures (Postgres, Loki, MinIO, logs).
        expr: |
          100 * node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host disk almost full on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has only {{ $value | printf \"%.1f\" }}% free for >5m. Writes will start failing. Follow the disk-cleanup runbook (Docker logs, old images, Loki retention, backups)."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostdiskspacelow"

      - alert: HostDiskSpaceLow
        # <20% free -> act before it becomes critical. Sized for a small single-VPS beta.
        expr: |
          100 * node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
            / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} < 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host disk space low on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has {{ $value | printf \"%.1f\" }}% free for >10m. Plan cleanup or resize before it hits the 10% critical threshold."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostdiskspacelow"

      - alert: HostDiskWillFillSoon
        # Trend-based: project free bytes from the last 6h and warn if the fs would fill within
        # 24h. Only fires while space is actually shrinking and not already critical, so it is
        # an early heads-up that HostDiskSpaceLow has not necessarily crossed yet.
        expr: |
          predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}[6h], 24 * 3600) < 0
            and node_filesystem_readonly{fstype!~"tmpfs|overlay|squashfs"} == 0
            and 100 * node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs"}
                  / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs"} < 40
        for: 30m
        labels:
          severity: warning
        annotations:
          summary: "Host disk {{ $labels.mountpoint }} will fill within 24h"
          description: "At the current growth rate {{ $labels.mountpoint }} on {{ $labels.instance }} is projected to run out of space within 24h. Find the growth source (Docker logs, Loki/Tempo data, backups, image bloat) before it fills."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostdiskspacelow"

      - alert: HostInodesCritical
        # Inode exhaustion fails writes even with bytes free (many small files: logs, caches).
        expr: |
          100 * node_filesystem_files_free{fstype!~"tmpfs|overlay|squashfs"}
            / node_filesystem_files{fstype!~"tmpfs|overlay|squashfs"} < 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host inodes almost exhausted on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has only {{ $value | printf \"%.1f\" }}% inodes free for >5m. Writes fail once inodes run out even with bytes free — hunt for directories with huge file counts (logs, tmp, caches)."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostinodeslow"

      - alert: HostInodesLow
        expr: |
          100 * node_filesystem_files_free{fstype!~"tmpfs|overlay|squashfs"}
            / node_filesystem_files{fstype!~"tmpfs|overlay|squashfs"} < 20
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host inodes low on {{ $labels.mountpoint }}"
          description: "{{ $labels.mountpoint }} on {{ $labels.instance }} has {{ $value | printf \"%.1f\" }}% inodes free for >10m. Investigate large file-count directories before it reaches the 10% critical threshold."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hostinodeslow"

      - alert: HostHighMemoryUsageCritical
        # MemAvailable accounts for reclaimable cache, so this is true memory pressure, not just
        # page-cache usage. >95% sustained -> OOM-kill risk for the JVMs/databases.
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 95
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Host memory critically high"
          description: "Host memory usage on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% (>95%) for >5m. The kernel OOM killer may start reaping containers (JVMs, Postgres). Check `docker stats`, container memory limits, and recent load."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hosthighmemoryusage"

      - alert: HostHighMemoryUsage
        expr: |
          100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host memory usage high"
          description: "Host memory usage on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% (>85%) for >10m. 10 JVMs on one VPS are memory-hungry — review MaxRAMPercentage / container limits before it reaches the 95% critical threshold."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hosthighmemoryusage"

      - alert: HostHighCpuUsageCritical
        # Non-idle CPU averaged across all cores. Sustained >95% means the box is saturated and
        # request latency/health probes are at risk.
        expr: |
          100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 95
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Host CPU critically saturated"
          description: "Host CPU on {{ $labels.instance }} has averaged {{ $value | printf \"%.1f\" }}% (>95%) for >10m. The VPS is saturated — expect latency and probe failures. Identify the hot container (`docker stats`) and scale or shed load."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hosthighcpuusage"

      - alert: HostHighCpuUsage
        expr: |
          100 * (1 - avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) > 85
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Host CPU usage high"
          description: "Host CPU on {{ $labels.instance }} has averaged {{ $value | printf \"%.1f\" }}% (>85%) for >10m. Check which container is hot (`docker stats`) and whether it is load or a runaway process before it saturates."
          runbook_url: "docs/architecture/observability-metrics.md#runbook--hosthighcpuusage"
