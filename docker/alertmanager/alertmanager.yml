global:
  resolve_timeout: 5m

route:
  receiver: "null"
  group_by: ["alertname", "service", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity="critical"
      receiver: "null"
      repeat_interval: 1h
    - matchers:
        - severity="warning"
      receiver: "null"
      repeat_interval: 4h

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]

receivers:
  - name: "null"
