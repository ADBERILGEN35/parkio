# Parkio — application services overlay.
#
# Adds the 10 Spring Boot services on top of the infrastructure defined in
# docker-compose.yml. Always run WITH the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build
#
# Each service connects ONLY to its own database (database-per-service,
# ai-context/01 & /05). Connection settings are injected as environment
# variables (ai-context/01: externalized config). These vars are inert until a
# service adds the matching Spring starter — no business logic is implied here.

name: parkio

# --------------------------------------------------------------------------- #
# Reusable fragments                                                          #
# --------------------------------------------------------------------------- #
x-app-common: &app-common
  restart: unless-stopped
  networks: [parkio-backend]
  environment: &app-env-common
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=75.0}
    # Shared gateway-ingress secret. The gateway stamps it onto every routed request
    # as X-Gateway-Auth; every downstream service requires it. Same value everywhere.
    PARKIO_GATEWAY_INTERNAL_SECRET: ${PARKIO_GATEWAY_INTERNAL_SECRET}

x-datasource-depends: &datasource-depends
  kafka:
    condition: service_healthy

services:
  # Edge — no database, uses Redis for rate limiting. Routes to the rest.
  gateway-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/gateway-service/Dockerfile
    ports: ["8080:8080"]
    environment:
      <<: *app-env-common
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      PARKIO_AUTH_JWKS_URI: http://auth-service:8081/api/v1/auth/.well-known/jwks.json
      # Browser origins allowed to call the gateway. Explicit allow-list (never "*");
      # defaults to the local Vite dev server. Override per environment; production
      # must set its real web origin(s). Empty in application.yml = deny (safe default).
      PARKIO_CORS_ALLOWED_ORIGINS: ${PARKIO_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      redis:
        condition: service_healthy

  auth-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports: ["8081:8081"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB:-parkio_auth}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_AUTH_USER:-parkio_auth}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      PARKIO_JWT_PRIVATE_KEY_PEM: ${PARKIO_JWT_PRIVATE_KEY_PEM}
      PARKIO_JWT_KEY_ID: ${PARKIO_JWT_KEY_ID:-parkio-auth-rs256-1}
      PARKIO_JWT_ISSUER: ${PARKIO_JWT_ISSUER:-parkio-auth}
    depends_on:
      <<: *datasource-depends
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    ports: ["8082:8082"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/${POSTGRES_USER_DB:-parkio_user}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER_USER:-parkio_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_USER_PASSWORD}
    depends_on:
      <<: *datasource-depends
      postgres-user:
        condition: service_healthy

  parking-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/parking-service/Dockerfile
    ports: ["8083:8083"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-parking:5432/${POSTGRES_PARKING_DB:-parkio_parking}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_PARKING_USER:-parkio_parking}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PARKING_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      <<: *datasource-depends
      postgres-parking:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    ports: ["8084:8084"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-media:5432/${POSTGRES_MEDIA_DB:-parkio_media}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MEDIA_USER:-parkio_media}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MEDIA_PASSWORD}
      # S3-compatible object storage (MinIO) — media bytes live here only.
      # NOTE: the property names MUST match media-service application.yml
      # (parkio.media.storage.* / parkio.media.bucket), i.e. the PARKIO_MEDIA_* env keys.
      #
      # The endpoint is also the HOST embedded in presigned GET URLs (the MinIO SDK
      # signs against the configured endpoint). It must therefore be reachable BOTH
      # from this container (to PUT/stat objects) AND from the end-user's browser (to
      # render the signed URL). host.docker.internal satisfies both on Docker Desktop
      # and, via the extra_hosts host-gateway mapping below, on Linux — the host's
      # published :9000 (see docker-compose.yml MINIO_API_PORT) is what both resolve to.
      # Override PARKIO_MEDIA_STORAGE_ENDPOINT per environment; never hardcode prod URLs.
      PARKIO_MEDIA_STORAGE_ENDPOINT: ${PARKIO_MEDIA_STORAGE_ENDPOINT:-http://host.docker.internal:9000}
      PARKIO_MEDIA_BUCKET: ${MINIO_BUCKET:-parkio-media}
      PARKIO_MEDIA_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-parkio}
      PARKIO_MEDIA_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    extra_hosts:
      # Makes host.docker.internal resolve to the Docker host on Linux too (native on
      # Docker Desktop). Lets this container reach MinIO via the host's published port.
      - "host.docker.internal:host-gateway"
    depends_on:
      <<: *datasource-depends
      postgres-media:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully

  gamification-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/gamification-service/Dockerfile
    ports: ["8085:8085"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-gamification:5432/${POSTGRES_GAMIFICATION_DB:-parkio_gamification}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_GAMIFICATION_USER:-parkio_gamification}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_GAMIFICATION_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    depends_on:
      <<: *datasource-depends
      postgres-gamification:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    ports: ["8086:8086"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/${POSTGRES_NOTIFICATION_DB:-parkio_notification}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_NOTIFICATION_USER:-parkio_notification}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD}
    depends_on:
      <<: *datasource-depends
      postgres-notification:
        condition: service_healthy

  moderation-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/moderation-service/Dockerfile
    ports: ["8087:8087"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-moderation:5432/${POSTGRES_MODERATION_DB:-parkio_moderation}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MODERATION_USER:-parkio_moderation}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MODERATION_PASSWORD}
    depends_on:
      <<: *datasource-depends
      postgres-moderation:
        condition: service_healthy

  # Advisory only (ai-context/02): consumes/produces events, owns no database.
  ai-validation-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/ai-validation-service/Dockerfile
    ports: ["8088:8088"]
    environment:
      <<: *app-env-common
    depends_on:
      <<: *datasource-depends

  analytics-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    ports: ["8089:8089"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-analytics:5432/${POSTGRES_ANALYTICS_DB:-parkio_analytics}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_ANALYTICS_USER:-parkio_analytics}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
    depends_on:
      <<: *datasource-depends
      postgres-analytics:
        condition: service_healthy
