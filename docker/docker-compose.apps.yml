# Parkio — application services overlay.
#
# Adds the 10 Spring Boot services on top of the infrastructure defined in
# docker-compose.yml. Always run WITH the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.apps.yml up -d --build
#
# Each service connects ONLY to its own database (database-per-service,
# ai-context/01 & /05). Connection settings are injected as environment
# variables (ai-context/01: externalized config). These vars are inert until a
# service adds the matching Spring starter — no business logic is implied here.
#
# RUNTIME HARDENING (P1.5): this overlay applies the cross-cutting runtime safety
# that is correct in EVERY environment — JVM container-awareness + fail-fast on OOM,
# Actuator-readiness healthchecks (so dependents start in order), log rotation,
# graceful-shutdown grace period, and baseline container hardening. Per-VPS resource
# CEILINGS (mem_limit/cpus/pids_limit) live in docker-compose.hosted-beta.yml because
# they are sized for a specific host; see docs/operations/runtime-sizing.md.

name: parkio

# --------------------------------------------------------------------------- #
# Reusable fragments                                                          #
# --------------------------------------------------------------------------- #

# Bounded container logs. Docker's json-file driver is UNBOUNDED by default, so a
# chatty or looping service can fill the host disk. Cap each container at 50 MB of
# logs (5 × 10 MB, rotated). Promtail still ships everything to Loki for retention.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# Container HEALTHCHECK defaults shared by every app service. The per-service `test`
# differs only by port (each service's Actuator is on its own server port). We probe
# READINESS (not liveness): a service counts as healthy for its dependents only once
# Flyway has migrated, the datasource pool is up and Kafka admin has connected — so
# `depends_on: condition: service_healthy` gates the startup graph on real readiness.
# Failures during start_period do not count, which absorbs JVM + migration warmup.
x-app-healthcheck: &app-healthcheck
  interval: 15s
  timeout: 5s
  retries: 5
  start_period: 60s

x-app-common: &app-common
  restart: unless-stopped
  networks: [parkio-backend]
  logging: *default-logging
  # Give Spring's graceful shutdown room to drain in-flight work on SIGTERM before
  # Docker escalates to SIGKILL. Must exceed spring.lifecycle.timeout-per-shutdown-phase
  # (30s, set below) so the JVM exits cleanly rather than being killed mid-request.
  stop_grace_period: 45s
  # Baseline container hardening (defense in depth; images already run as non-root uid
  # 10001). no-new-privileges blocks setuid escalation; an HTTP/JVM service needs no
  # Linux capabilities, so drop them all. Stronger read-only-rootfs is tracked as a
  # follow-up (needs live multipart-upload validation — see runtime-sizing.md).
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  # Cap the process/thread count so a thread leak or fork loop cannot exhaust host PIDs.
  pids_limit: 512
  environment: &app-env-common
    SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,prometheus
    # JVM runtime safety:
    #  - MaxRAMPercentage=65 sizes the heap to 65% of the CONTAINER limit (set in the
    #    hosted-beta overlay), leaving headroom for metaspace, thread stacks, code cache
    #    and direct buffers so the kernel does not cgroup-OOM-kill the container. Without
    #    a mem_limit (local base+apps only) it reads host RAM — set a limit in production.
    #  - InitialRAMPercentage=40 commits a sensible starting heap to cut resize churn.
    #  - MaxMetaspaceSize caps a notorious native-OOM source (classloader leaks).
    #  - ExitOnOutOfMemoryError turns a heap OOM into a fast exit so `restart` recycles the
    #    container instead of letting it GC-thrash forever (paired with the HighJvmMemoryUsage
    #    alert in prometheus/alerts.yml).
    JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--XX:MaxRAMPercentage=65.0 -XX:InitialRAMPercentage=40.0 -XX:MaxMetaspaceSize=192m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError}
    # Spring graceful shutdown drain budget (server.shutdown: graceful is set in each
    # service's application.yml). Centralized here via relaxed binding so it stays in
    # lockstep with stop_grace_period above.
    SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:-30s}
    # Distributed tracing -> Tempo (OTLP/HTTP). 100% sampling for the beta; tune via env.
    # The OTLP receiver is private to the Docker network (tempo:4318, never published).
    PARKIO_TRACING_ENABLED: ${PARKIO_TRACING_ENABLED:-true}
    PARKIO_TRACING_SAMPLING_PROBABILITY: ${PARKIO_TRACING_SAMPLING_PROBABILITY:-1.0}
    PARKIO_TRACING_OTLP_ENDPOINT: ${PARKIO_TRACING_OTLP_ENDPOINT:-http://tempo:4318/v1/traces}
    # Shared gateway-ingress secret. The gateway stamps it onto every routed request
    # as X-Gateway-Auth; every downstream service requires it. Same value everywhere.
    PARKIO_GATEWAY_INTERNAL_SECRET: ${PARKIO_GATEWAY_INTERNAL_SECRET}

x-datasource-depends: &datasource-depends
  kafka:
    condition: service_healthy

services:
  # Edge — no database, uses Redis for rate limiting. Routes to the rest.
  gateway-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/gateway-service/Dockerfile
    ports: ["8080:8080"]
    environment:
      <<: *app-env-common
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      PARKIO_AUTH_JWKS_URI: http://auth-service:8081/api/v1/auth/.well-known/jwks.json
      # Downstream route targets. The gateway resolves each ${PARKIO_*_SERVICE_URI}
      # placeholder in application.yml; their defaults are localhost:808x (dev-from-IDE),
      # which inside this container would point at the gateway itself. In the compose
      # network they must be the service DNS names. PARKIO_USER_SERVICE_URI also backs
      # the per-request account-status lookup (parkio.gateway.user-status.base-url), so
      # without it every authenticated request fails closed.
      PARKIO_AUTH_SERVICE_URI: http://auth-service:8081
      PARKIO_USER_SERVICE_URI: http://user-service:8082
      PARKIO_PARKING_SERVICE_URI: http://parking-service:8083
      PARKIO_MEDIA_SERVICE_URI: http://media-service:8084
      PARKIO_GAMIFICATION_SERVICE_URI: http://gamification-service:8085
      PARKIO_NOTIFICATION_SERVICE_URI: http://notification-service:8086
      PARKIO_MODERATION_SERVICE_URI: http://moderation-service:8087
      PARKIO_AI_VALIDATION_SERVICE_URI: http://ai-validation-service:8088
      PARKIO_ANALYTICS_SERVICE_URI: http://analytics-service:8089
      # Browser origins allowed to call the gateway. Explicit allow-list (never "*");
      # defaults to the local Vite dev server. Override per environment; production
      # must set its real web origin(s). Empty in application.yml = deny (safe default).
      PARKIO_CORS_ALLOWED_ORIGINS: ${PARKIO_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PARKIO_CORS_ALLOW_CREDENTIALS: ${PARKIO_CORS_ALLOW_CREDENTIALS:-true}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health/readiness"]
    # The edge serves authenticated traffic only once auth (JWKS) and user (account
    # status) are ready; ordering here removes the startup window of fail-closed 503s.
    # Both deps fail closed at runtime too, so this is ordering, not a hard coupling.
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      user-service:
        condition: service_healthy

  auth-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
    ports: ["8081:8081"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/${POSTGRES_AUTH_DB:-parkio_auth}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_AUTH_USER:-parkio_auth}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      PARKIO_JWT_PRIVATE_KEY_PEM: ${PARKIO_JWT_PRIVATE_KEY_PEM}
      PARKIO_JWT_KEY_ID: ${PARKIO_JWT_KEY_ID:-parkio-auth-rs256-1}
      PARKIO_JWT_ISSUER: ${PARKIO_JWT_ISSUER:-parkio-auth}
      PARKIO_CORS_ALLOWED_ORIGINS: ${PARKIO_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      PARKIO_EMAIL_PROVIDER: ${PARKIO_EMAIL_PROVIDER:-logging}
      PARKIO_RESEND_API_KEY: ${PARKIO_RESEND_API_KEY:-}
      PARKIO_EMAIL_FROM: ${PARKIO_EMAIL_FROM:-}
      PARKIO_EMAIL_REPLY_TO: ${PARKIO_EMAIL_REPLY_TO:-}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-auth:
        condition: service_healthy
      redis:
        condition: service_healthy

  user-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/user-service/Dockerfile
    ports: ["8082:8082"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/${POSTGRES_USER_DB:-parkio_user}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER_USER:-parkio_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_USER_PASSWORD}
      PARKIO_SMART_RETURN_ENABLED: ${PARKIO_SMART_RETURN_ENABLED:-false}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8082/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-user:
        condition: service_healthy

  parking-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/parking-service/Dockerfile
    ports: ["8083:8083"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-parking:5432/${POSTGRES_PARKING_DB:-parkio_parking}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_PARKING_USER:-parkio_parking}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PARKING_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
      # Internal client for POST /internal/media/{id}/access-url (parkio.media.client.base-url).
      # Defaults to localhost:8084 (IDE dev); inside compose must be the service DNS name.
      PARKIO_MEDIA_SERVICE_URI: http://media-service:8084
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8083/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-parking:
        condition: service_healthy
      redis:
        condition: service_healthy

  media-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/media-service/Dockerfile
    ports: ["8084:8084"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-media:5432/${POSTGRES_MEDIA_DB:-parkio_media}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MEDIA_USER:-parkio_media}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MEDIA_PASSWORD}
      # S3-compatible object storage (MinIO) — media bytes live here only.
      # NOTE: the property names MUST match media-service application.yml
      # (parkio.media.storage.* / parkio.media.bucket), i.e. the PARKIO_MEDIA_* env keys.
      #
      # Split endpoints: internal SDK ops vs browser-facing presigned GET host.
      # SigV4 signs the Host header — the presign host must match what the browser
      # requests. Internal PUT/stat/DELETE use the in-cluster MinIO service name;
      # presigned URLs embed localhost (or your public ingress) on the host port.
      PARKIO_MEDIA_STORAGE_ENDPOINT: ${PARKIO_MEDIA_STORAGE_ENDPOINT:-http://minio:9000}
      PARKIO_MEDIA_STORAGE_PUBLIC_ENDPOINT: ${PARKIO_MEDIA_STORAGE_PUBLIC_ENDPOINT:-http://localhost:9000}
      PARKIO_MEDIA_BUCKET: ${MINIO_BUCKET:-parkio-media}
      PARKIO_MEDIA_STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-parkio}
      PARKIO_MEDIA_STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      # Anti-malware scan (ClamAV/clamd). Uploads fail closed (503) if clamd is
      # unreachable, so this points at the clamav service on the private network.
      PARKIO_MEDIA_SCANNER_ENABLED: ${PARKIO_MEDIA_SCANNER_ENABLED:-true}
      PARKIO_MEDIA_SCANNER_HOST: ${PARKIO_MEDIA_SCANNER_HOST:-clamav}
      PARKIO_MEDIA_SCANNER_PORT: ${PARKIO_MEDIA_SCANNER_PORT:-3310}
      PARKIO_MEDIA_SCANNER_CONNECT_TIMEOUT: ${PARKIO_MEDIA_SCANNER_CONNECT_TIMEOUT:-2s}
      PARKIO_MEDIA_SCANNER_READ_TIMEOUT: ${PARKIO_MEDIA_SCANNER_READ_TIMEOUT:-10s}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-media:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
      clamav:
        condition: service_healthy

  gamification-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/gamification-service/Dockerfile
    ports: ["8085:8085"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-gamification:5432/${POSTGRES_GAMIFICATION_DB:-parkio_gamification}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_GAMIFICATION_USER:-parkio_gamification}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_GAMIFICATION_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8085/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-gamification:
        condition: service_healthy
      redis:
        condition: service_healthy

  notification-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
    ports: ["8086:8086"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-notification:5432/${POSTGRES_NOTIFICATION_DB:-parkio_notification}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_NOTIFICATION_USER:-parkio_notification}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_NOTIFICATION_PASSWORD}
      PARKIO_SMART_RETURN_ENABLED: ${PARKIO_SMART_RETURN_ENABLED:-false}
      PARKIO_SMART_RETURN_SCHEDULER_ENABLED: ${PARKIO_SMART_RETURN_SCHEDULER_ENABLED:-false}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8086/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-notification:
        condition: service_healthy

  moderation-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/moderation-service/Dockerfile
    ports: ["8087:8087"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-moderation:5432/${POSTGRES_MODERATION_DB:-parkio_moderation}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_MODERATION_USER:-parkio_moderation}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_MODERATION_PASSWORD}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8087/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-moderation:
        condition: service_healthy

  # Advisory only (ai-context/02): consumes/produces events. Owns its own database
  # for advisory results (Flyway migrations + JPA entities), like the other services.
  ai-validation-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/ai-validation-service/Dockerfile
    ports: ["8088:8088"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ai-validation:5432/${POSTGRES_AIVALIDATION_DB:-parkio_aivalidation}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_AIVALIDATION_USER:-parkio_aivalidation}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_AIVALIDATION_PASSWORD}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8088/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-ai-validation:
        condition: service_healthy

  analytics-service:
    <<: *app-common
    build:
      context: ..
      dockerfile: services/analytics-service/Dockerfile
    ports: ["8089:8089"]
    environment:
      <<: *app-env-common
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-analytics:5432/${POSTGRES_ANALYTICS_DB:-parkio_analytics}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_ANALYTICS_USER:-parkio_analytics}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD}
    healthcheck:
      <<: *app-healthcheck
      test: ["CMD", "curl", "-fsS", "http://localhost:8089/actuator/health/readiness"]
    depends_on:
      <<: *datasource-depends
      postgres-analytics:
        condition: service_healthy
